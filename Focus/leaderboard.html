<!DOCTYPE html>

<html lang="en" data-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusOS | Global Rankings</title>
    <link rel="stylesheet" href="themes.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        try {
            const userId = localStorage.getItem('fos_last_user_id');
            if (userId) {
                const rawProfile = localStorage.getItem('fos_idx_profile_' + userId);
                if (rawProfile) {
                    const profile = JSON.parse(rawProfile).data;
                    if (profile && profile.current_theme)
                        document.documentElement.setAttribute('data-theme', profile.current_theme);
                }
            }
        } catch(e) {}
    </script>


<style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 30px 30px 60px;
        transition: background-color 0.3s;
        min-height: 100vh;
    }

    /* ── PAGE HEADER ── */
    .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 32px;
        flex-wrap: wrap;
        gap: 16px;
    }
    .page-header-left h1 {
        font-family: 'Anton', sans-serif;
        font-size: 3.2rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        line-height: 1;
        color: var(--text-main);
    }
    .page-header-left p {
        font-size: 0.75rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-muted);
        margin-top: 6px;
        font-family: 'Space Mono', monospace;
    }

    /* Live badge */
    .live-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--panel-bg);
        border: 2px solid var(--text-main);
        border-radius: 50px;
        padding: 8px 16px;
        font-size: 0.7rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        box-shadow: 3px 3px 0px var(--text-main);
    }
    .live-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #10b981;
        animation: livePulse 1.8s ease-in-out infinite;
    }
    @keyframes livePulse {
        0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
        50% { opacity: 0.6; box-shadow: 0 0 0 5px rgba(16,185,129,0); }
    }

    /* ── SEARCH & FILTER BAR ── */
    .controls-bar {
        display: flex;
        gap: 12px;
        margin-bottom: 28px;
        flex-wrap: wrap;
    }
    .search-wrap {
        flex: 1;
        min-width: 200px;
        position: relative;
    }
    .search-wrap svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        stroke: var(--text-muted);
        stroke-width: 2.5;
        fill: none;
    }
    .search-input {
        width: 100%;
        padding: 12px 14px 12px 42px;
        background: var(--panel-bg);
        border: 2px solid var(--text-main);
        border-radius: 10px;
        color: var(--text-main);
        font-size: 0.9rem;
        font-weight: 700;
        outline: none;
        box-shadow: 3px 3px 0px var(--text-main);
        transition: box-shadow 0.15s, transform 0.15s;
        font-family: 'Space Mono', monospace;
    }
    .search-input:focus {
        box-shadow: 5px 5px 0px var(--primary);
        transform: translate(-1px, -1px);
    }
    .search-input::placeholder { color: var(--text-muted); opacity: 0.7; }

    .filter-btn {
        padding: 12px 20px;
        background: var(--panel-bg);
        border: 2px solid var(--text-main);
        border-radius: 10px;
        font-size: 0.75rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        color: var(--text-main);
        box-shadow: 3px 3px 0px var(--text-main);
        transition: all 0.1s;
        white-space: nowrap;
    }
    .filter-btn.active {
        background: var(--text-main);
        color: var(--bg-color);
        transform: translate(2px, 2px);
        box-shadow: 1px 1px 0px var(--primary);
    }
    .filter-btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px transparent; }

    /* ── MY POSITION BANNER ── */
    .my-position-banner {
        display: none;
        background: var(--primary);
        border: 3px solid var(--text-main);
        border-radius: 16px;
        padding: 16px 22px;
        margin-bottom: 28px;
        box-shadow: 5px 5px 0px var(--text-main);
        animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .my-position-banner.visible { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .my-pos-rank {
        font-family: 'Anton', sans-serif;
        font-size: 2.5rem;
        color: #111827;
        line-height: 1;
    }
    .my-pos-divider { width: 3px; height: 40px; background: rgba(17,24,39,0.2); border-radius: 2px; }
    .my-pos-info { flex: 1; }
    .my-pos-name {
        font-size: 1rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #111827;
    }
    .my-pos-sub {
        font-size: 0.65rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: rgba(17,24,39,0.6);
        margin-top: 3px;
    }
    .my-pos-xp {
        font-family: 'Space Mono', monospace;
        font-size: 1.1rem;
        font-weight: 700;
        color: #111827;
        background: rgba(255,255,255,0.4);
        border: 2px solid rgba(17,24,39,0.3);
        border-radius: 8px;
        padding: 6px 14px;
    }

    /* ── PODIUM ── */
    .podium-section {
        margin-bottom: 32px;
    }
    .podium-label {
        font-size: 0.7rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-muted);
        margin-bottom: 16px;
        font-family: 'Space Mono', monospace;
    }
    .podium-row {
        display: grid;
        grid-template-columns: 1fr 1.15fr 1fr;
        gap: 16px;
        align-items: end;
    }

    .podium-card {
        border: 3px solid var(--text-main);
        border-radius: 20px;
        padding: 20px 16px;
        text-align: center;
        position: relative;
        overflow: hidden;
        transition: transform 0.2s, box-shadow 0.2s;
        animation: podiumRise 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    .podium-card:nth-child(1) { animation-delay: 0.15s; }
    .podium-card:nth-child(2) { animation-delay: 0s; }
    .podium-card:nth-child(3) { animation-delay: 0.3s; }
    @keyframes podiumRise {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
    .podium-card:hover { transform: translate(-2px, -3px); }

    /* Gold */
    .podium-1 {
        background: linear-gradient(160deg, #FFD700 0%, #FFF176 40%, #F9A825 100%);
        box-shadow: 6px 6px 0px #111827;
    }
    .podium-1:hover { box-shadow: 9px 9px 0px #111827; }
    /* Silver */
    .podium-2 {
        background: linear-gradient(160deg, #E8E8E8 0%, #ffffff 40%, #B0B0B0 100%);
        box-shadow: 5px 5px 0px #111827;
    }
    .podium-2:hover { box-shadow: 8px 8px 0px #111827; }
    /* Bronze */
    .podium-3 {
        background: linear-gradient(160deg, #CD7F32 0%, #FFCC80 40%, #A0522D 100%);
        box-shadow: 4px 4px 0px #111827;
    }
    .podium-3:hover { box-shadow: 7px 7px 0px #111827; }

    /* Shimmer on top 3 */
    .podium-card::before {
        content: '';
        position: absolute;
        top: 0; left: -60%;
        width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.55), transparent);
        transform: skewX(-20deg);
        animation: shimmer 3.5s infinite;
    }
    @keyframes shimmer { 0% { left: -60%; } 18% { left: 120%; } 100% { left: 120%; } }

    .podium-medal {
        font-size: 2.2rem;
        line-height: 1;
        margin-bottom: 8px;
        display: block;
        position: relative;
        z-index: 1;
    }
    .podium-rank-num {
        font-family: 'Anton', sans-serif;
        font-size: 0.75rem;
        letter-spacing: 2px;
        color: rgba(17,24,39,0.5);
        text-transform: uppercase;
        margin-bottom: 6px;
        position: relative;
        z-index: 1;
    }
    .podium-name {
        font-size: 1rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.3px;
        color: #111827;
        line-height: 1.2;
        position: relative;
        z-index: 1;
        word-break: break-word;
    }
    .podium-2 .podium-name, .podium-3 .podium-name { font-size: 0.9rem; }
    .podium-rank-badge {
        display: inline-block;
        background: rgba(17,24,39,0.12);
        border: 1.5px solid rgba(17,24,39,0.25);
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 0.6rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: rgba(17,24,39,0.7);
        margin-top: 6px;
        position: relative;
        z-index: 1;
    }
    .podium-xp {
        font-family: 'Space Mono', monospace;
        font-size: 0.95rem;
        font-weight: 700;
        color: #111827;
        margin-top: 10px;
        background: rgba(255,255,255,0.4);
        border: 2px solid rgba(17,24,39,0.2);
        border-radius: 8px;
        padding: 4px 10px;
        display: inline-block;
        position: relative;
        z-index: 1;
    }
    .you-crown {
        position: absolute;
        top: 8px;
        right: 10px;
        font-size: 1.2rem;
        z-index: 2;
    }

    /* ── RANK LIST ── */
    .list-section { }
    .list-label {
        font-size: 0.7rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-muted);
        margin-bottom: 14px;
        font-family: 'Space Mono', monospace;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .list-count-badge {
        background: var(--bg-color);
        border: 2px solid var(--border-color);
        border-radius: 50px;
        padding: 3px 10px;
        font-size: 0.6rem;
        color: var(--text-muted);
    }

    .rank-list { display: flex; flex-direction: column; gap: 10px; }

    .rank-row {
        background: var(--panel-bg);
        border: 2px solid var(--border-color);
        border-radius: 14px;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
        animation: rowSlide 0.35s ease both;
        cursor: default;
    }
    .rank-row:hover {
        transform: translateX(4px);
        border-color: var(--text-main);
        box-shadow: 4px 0px 0px var(--primary);
    }
    .rank-row.is-me {
        background: var(--panel-bg);
        border: 2px solid var(--primary);
        box-shadow: 4px 4px 0px var(--primary);
    }
    .rank-row.is-me:hover {
        transform: translateX(4px);
        box-shadow: 6px 4px 0px var(--primary);
    }
    @keyframes rowSlide {
        from { transform: translateX(-8px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    .rank-pos {
        font-family: 'Space Mono', monospace;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--text-muted);
        width: 36px;
        text-align: center;
        flex-shrink: 0;
    }
    .rank-row.is-me .rank-pos { color: var(--primary); }

    .rank-avatar {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        border: 2px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 0.95rem;
        flex-shrink: 0;
        text-transform: uppercase;
        transition: border-color 0.15s;
    }
    .rank-row:hover .rank-avatar { border-color: var(--text-main); }
    .rank-row.is-me .rank-avatar { border-color: var(--primary); }

    .rank-name-block { flex: 1; min-width: 0; }
    .rank-name {
        font-weight: 900;
        font-size: 0.95rem;
        letter-spacing: -0.2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-main);
    }
    .rank-tier {
        font-size: 0.6rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--text-muted);
        margin-top: 2px;
    }
    .rank-row.is-me .rank-name { color: var(--primary); }

    /* XP bar + value */
    .rank-xp-block {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 5px;
        min-width: 100px;
    }
    .rank-xp-val {
        font-family: 'Space Mono', monospace;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--text-main);
        white-space: nowrap;
    }
    .rank-xp-bar-bg {
        width: 80px;
        height: 5px;
        background: var(--bg-color);
        border: 1.5px solid var(--border-color);
        border-radius: 3px;
        overflow: hidden;
    }
    .rank-xp-bar-fill {
        height: 100%;
        border-radius: 2px;
        background: var(--primary);
        transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .rank-row.is-me .rank-xp-bar-fill { background: var(--primary); }

    .you-chip {
        background: var(--primary);
        color: #111827;
        font-size: 0.55rem;
        font-weight: 900;
        padding: 2px 7px;
        border-radius: 6px;
        letter-spacing: 1px;
        border: 1.5px solid var(--text-main);
        flex-shrink: 0;
        text-transform: uppercase;
    }

    /* ── EMPTY / ERROR / LOADING ── */
    .state-card {
        background: var(--panel-bg);
        border: 3px dashed var(--border-color);
        border-radius: 16px;
        padding: 40px 20px;
        text-align: center;
        font-weight: 900;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
    }
    .state-card .state-icon { font-size: 2rem; margin-bottom: 12px; display: block; }

    /* ── SKELETON LOADER ── */
    .skeleton-row {
        background: var(--panel-bg);
        border: 2px solid var(--border-color);
        border-radius: 14px;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        overflow: hidden;
        position: relative;
    }
    .skeleton-row::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
        animation: skelPulse 1.4s infinite;
    }
    @keyframes skelPulse { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .skel-block { background: var(--border-color); border-radius: 6px; opacity: 0.5; flex-shrink: 0; }
    .skel-circle { border-radius: 10px; }

    /* ── NO RESULT ── */
    .no-result {
        text-align: center;
        padding: 30px 20px;
        color: var(--text-muted);
        font-weight: 900;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
        body { padding: 16px 14px 80px; }
        .page-header-left h1 { font-size: 2.4rem; }
        .podium-row { gap: 10px; }
        .podium-name { font-size: 0.82rem; }
        .rank-row { padding: 12px 14px; gap: 10px; }
        .rank-xp-block { min-width: 70px; }
        .rank-xp-bar-bg { width: 55px; }
        .rank-avatar { width: 32px; height: 32px; font-size: 0.8rem; }
    }
    @media (max-width: 400px) {
        .podium-xp { font-size: 0.75rem; padding: 3px 7px; }
        .podium-medal { font-size: 1.8rem; }
    }
</style>


</head>
<body>


<!-- PAGE HEADER -->
<div class="page-header">
    <div class="page-header-left">
        <h1>Rankings</h1>
       
    </div>
    <div class="live-badge">
        <span class="live-dot"></span>
        Live · Global
    </div>
</div>

<!-- SEARCH + FILTER -->
<div class="controls-bar">
    <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search agent..." oninput="filterList()">
    </div>
    <button class="filter-btn active" id="filterAll" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" id="filterTop10" onclick="setFilter('top10', this)">Top 10</button>
    <button class="filter-btn" id="filterNearMe" onclick="setFilter('nearme', this)">Near Me</button>
</div>

<!-- MY POSITION BANNER -->
<div class="my-position-banner" id="myPositionBanner">
    <div class="my-pos-rank" id="myPosRank">—</div>
    <div class="my-pos-divider"></div>
    <div class="my-pos-info">
        <div class="my-pos-name" id="myPosName">—</div>
        <div class="my-pos-sub" id="myPosSub">Your current position</div>
    </div>
    <div class="my-pos-xp" id="myPosXp">0 XP</div>
</div>

<!-- PODIUM TOP 3 -->
<div class="podium-section">
    <div class="podium-label">Top Operatives</div>
    <div class="podium-row" id="podiumRow">
        <!-- Skeleton -->
        <div class="skeleton-row" style="height: 140px; border-radius: 20px;">
            <div style="flex:1;"></div>
        </div>
        <div class="skeleton-row" style="height: 160px; border-radius: 20px;">
            <div style="flex:1;"></div>
        </div>
        <div class="skeleton-row" style="height: 130px; border-radius: 20px;">
            <div style="flex:1;"></div>
        </div>
    </div>
</div>

<!-- RANK LIST -->
<div class="list-section">
    <div class="list-label">
        <span>Full Rankings</span>
        <span class="list-count-badge" id="listCountBadge">Loading…</span>
    </div>
    <div class="rank-list" id="rankList">
        <!-- Skeleton rows -->
        <div class="skeleton-row">
            <div class="skel-block skel-circle" style="width:36px;height:36px;"></div>
            <div class="skel-block skel-circle" style="width:36px;height:36px;"></div>
            <div style="flex:1;"><div class="skel-block" style="width:55%;height:12px;margin-bottom:6px;"></div><div class="skel-block" style="width:35%;height:8px;"></div></div>
            <div class="skel-block" style="width:80px;height:12px;"></div>
        </div>
        <div class="skeleton-row">
            <div class="skel-block skel-circle" style="width:36px;height:36px;"></div>
            <div class="skel-block skel-circle" style="width:36px;height:36px;"></div>
            <div style="flex:1;"><div class="skel-block" style="width:45%;height:12px;margin-bottom:6px;"></div><div class="skel-block" style="width:30%;height:8px;"></div></div>
            <div class="skel-block" style="width:80px;height:12px;"></div>
        </div>
        <div class="skeleton-row">
            <div class="skel-block skel-circle" style="width:36px;height:36px;"></div>
            <div class="skel-block skel-circle" style="width:36px;height:36px;"></div>
            <div style="flex:1;"><div class="skel-block" style="width:60%;height:12px;margin-bottom:6px;"></div><div class="skel-block" style="width:40%;height:8px;"></div></div>
            <div class="skel-block" style="width:80px;height:12px;"></div>
        </div>
    </div>
</div>

<script>
    // ── CONSTANTS ──────────────────────────────────────────────────────
    const SUPABASE_URL = 'https://xyhswdekhebcdmiyxfbo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_UsVbr-Rs8gDF-H9OdXKQEQ_qpv0Pf2m';

    const RANK_TIERS = [
        { min: 0,    title: 'Initiate'    },
        { min: 100,  title: 'Adept'       },
        { min: 300,  title: 'Architect'   },
        { min: 700,  title: 'Oracle'      },
        { min: 1500, title: 'Matrix Lord' },
        { min: 3000, title: 'Grandmaster' }
    ];

    // Avatar palette — picks a color deterministically per name
    const AVATAR_COLORS = [
        ['#6ba4ed','#111827'], ['#ff6b81','#111827'], ['#10b981','#111827'],
        ['#f59e0b','#111827'], ['#8a65e8','#111827'], ['#ec407a','#111827'],
        ['#0ea5e9','#111827'], ['#f43f5e','#111827'], ['#14b8a6','#111827'],
        ['#FFB86B','#111827']
    ];

    // ── GLOBALS ────────────────────────────────────────────────────────
    let allProfiles  = [];
    let currentUserId = localStorage.getItem('fos_last_user_id') || '';
    let activeFilter = 'all';
    let myRankIndex  = -1;

    // ── THEME SYNC ─────────────────────────────────────────────────────
    window.addEventListener('message', (event) => {
        if (event.data === 'sync_bank') {
            const userId = localStorage.getItem('fos_last_user_id');
            const rawProfile = localStorage.getItem('fos_idx_profile_' + userId);
            if (rawProfile) {
                const profile = JSON.parse(rawProfile).data;
                if (profile?.current_theme)
                    document.documentElement.setAttribute('data-theme', profile.current_theme);
            }
        }
    });

    // ── NAME FORMATTER ─────────────────────────────────────────────────
    // Strips domain, decodes separators, capitalises properly
    function formatName(rawEmail) {
        if (!rawEmail) return 'Unknown Agent';
        let s = String(rawEmail).trim();

        // Strip email domain
        if (s.includes('@')) s = s.split('@')[0];

        // Replace common separators with space
        s = s.replace(/[._+\-]/g, ' ');

        // Remove anything that isn't a letter, digit, or space
        s = s.replace(/[^a-zA-Z0-9 ]/g, '').trim();

        if (!s) return 'Unknown Agent';

        // Title-case each word
        return s
            .split(/\s+/)
            .filter(Boolean)
            .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
            .join(' ');
    }

    // ── RANK TIER LOOKUP ───────────────────────────────────────────────
    function getRankTier(xp) {
        let tier = RANK_TIERS[0];
        for (const t of RANK_TIERS) { if (xp >= t.min) tier = t; }
        return tier.title;
    }

    // Percentage toward next tier (for XP progress bar in list)
    function getXpPct(xp) {
        for (let i = RANK_TIERS.length - 1; i >= 0; i--) {
            if (xp >= RANK_TIERS[i].min) {
                const next = RANK_TIERS[i + 1];
                if (!next) return 100;
                const prev = RANK_TIERS[i].min;
                return Math.min(100, Math.round(((xp - prev) / (next.min - prev)) * 100));
            }
        }
        return 0;
    }

    // Deterministic avatar color from name
    function avatarColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) & 0xffffff;
        return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
    }

    // ── FILTER / SEARCH LOGIC ──────────────────────────────────────────
    function setFilter(mode, el) {
        activeFilter = mode;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderList(getFilteredProfiles());
    }

    function filterList() {
        renderList(getFilteredProfiles());
    }

    function getFilteredProfiles() {
        const query = (document.getElementById('searchInput').value || '').trim().toLowerCase();
        let result = [...allProfiles];

        if (activeFilter === 'top10') result = result.slice(0, 10);
        else if (activeFilter === 'nearme' && myRankIndex >= 0) {
            const lo = Math.max(0, myRankIndex - 4);
            const hi = Math.min(result.length, myRankIndex + 5);
            result = result.slice(lo, hi);
        }

        if (query) {
            result = result.filter(p =>
                formatName(p.email).toLowerCase().includes(query)
            );
        }
        return result;
    }

    // ── MEDAL EMOJI ────────────────────────────────────────────────────
    function medalEmoji(rank) {
        if (rank === 1) return '🥇';
        if (rank === 2) return '🥈';
        return '🥉';
    }

    // ── RENDER PODIUM ──────────────────────────────────────────────────
    function renderPodium(profiles) {
        const podiumRow = document.getElementById('podiumRow');
        // We want order: 2nd | 1st | 3rd visually
        const slots = [
            { data: profiles[1], rank: 2, cls: 'podium-2' },
            { data: profiles[0], rank: 1, cls: 'podium-1' },
            { data: profiles[2], rank: 3, cls: 'podium-3' }
        ];

        podiumRow.innerHTML = slots.map(slot => {
            if (!slot.data) {
                return `<div class="${slot.cls} podium-card" style="opacity:0.3;">
                    <span class="podium-medal">—</span>
                    <div class="podium-name">Empty</div>
                </div>`;
            }
            const name = formatName(slot.data.email);
            const xp   = slot.data.xp || 0;
            const tier = getRankTier(xp);
            const isMe = slot.data.id === currentUserId;
            return `<div class="${slot.cls} podium-card">
                ${isMe ? `<span class="you-crown" title="That's you!">⭐</span>` : ''}
                <span class="podium-medal">${medalEmoji(slot.rank)}</span>
                <div class="podium-rank-num">#${slot.rank}</div>
                <div class="podium-name">${name}${isMe ? '<br><span style="font-size:0.6rem;opacity:0.7;">YOU</span>' : ''}</div>
                <div class="podium-rank-badge">${tier}</div>
                <div class="podium-xp">${xp.toLocaleString()} XP</div>
            </div>`;
        }).join('');
    }

    // ── RENDER LIST ────────────────────────────────────────────────────
    function renderList(profiles) {
        const list  = document.getElementById('rankList');
        const badge = document.getElementById('listCountBadge');
        badge.textContent = `${profiles.length} Agents`;

        if (profiles.length === 0) {
            list.innerHTML = `<div class="no-result">No agents match your search.</div>`;
            return;
        }

        const maxXp = allProfiles[0]?.xp || 1;

        list.innerHTML = profiles.map((p, idx) => {
            // Find true global rank
            const globalRank = allProfiles.findIndex(ap => ap.id === p.id) + 1;
            const name  = formatName(p.email);
            const xp    = p.xp || 0;
            const tier  = getRankTier(xp);
            const pct   = getXpPct(xp);
            const isMe  = p.id === currentUserId;
            const [bg, fg] = avatarColor(name);
            const initial = name.charAt(0).toUpperCase();

            // Stagger animation delay
            const delay = Math.min(idx * 0.04, 0.5);

            return `<div class="rank-row${isMe ? ' is-me' : ''}" style="animation-delay:${delay}s;">
                <div class="rank-pos">#${String(globalRank).padStart(2, '0')}</div>
                <div class="rank-avatar" style="background:${bg}; color:${fg};">${initial}</div>
                <div class="rank-name-block">
                    <div class="rank-name">${name}</div>
                    <div class="rank-tier">${tier}</div>
                </div>
                ${isMe ? `<span class="you-chip">You</span>` : ''}
                <div class="rank-xp-block">
                    <div class="rank-xp-val">${xp.toLocaleString()} XP</div>
                    <div class="rank-xp-bar-bg">
                        <div class="rank-xp-bar-fill" style="width:${Math.max(4, Math.round((xp / maxXp) * 100))}%;"></div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // ── MY POSITION BANNER ─────────────────────────────────────────────
    function renderMyBanner(profile, rankNum) {
        if (!profile) return;
        const banner  = document.getElementById('myPositionBanner');
        const name    = formatName(profile.email);
        const xp      = profile.xp || 0;
        const tier    = getRankTier(xp);
        document.getElementById('myPosRank').textContent = `#${rankNum}`;
        document.getElementById('myPosName').textContent = name;
        document.getElementById('myPosSub').textContent  = `${tier} · ${xp.toLocaleString()} XP`;
        document.getElementById('myPosXp').textContent   = `${xp.toLocaleString()} XP`;
        banner.classList.add('visible');
    }

    // ── LOAD DATA ──────────────────────────────────────────────────────
    async function loadLeaderboard() {
        if (!navigator.onLine) {
            document.getElementById('podiumRow').innerHTML = `
                <div class="state-card" style="grid-column:1/-1;">
                    <span class="state-icon">⚡</span>
                    Offline — live rankings unavailable
                </div>`;
            document.getElementById('rankList').innerHTML = '';
            return;
        }

        try {
            const sb = window.parent?.supabaseClient
                || window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const { data, error } = await sb
                .from('user_profile')
                .select('id, xp, email')
                .order('xp', { ascending: false });

            if (error) throw error;

            allProfiles = (data || []).filter(p => (p.xp || 0) >= 0);

            if (allProfiles.length === 0) {
                document.getElementById('podiumRow').innerHTML =
                    `<div class="state-card" style="grid-column:1/-1;"><span class="state-icon">🔍</span>No agents found.</div>`;
                document.getElementById('rankList').innerHTML = '';
                return;
            }

            // Find current user position
            myRankIndex = allProfiles.findIndex(p => p.id === currentUserId);
            if (myRankIndex >= 0) {
                renderMyBanner(allProfiles[myRankIndex], myRankIndex + 1);
            }

            renderPodium(allProfiles.slice(0, 3));
            renderList(getFilteredProfiles());

        } catch (err) {
            console.error('Leaderboard error:', err);
            document.getElementById('podiumRow').innerHTML =
                `<div class="state-card" style="grid-column:1/-1;"><span class="state-icon">⚠️</span>${err.message}</div>`;
            document.getElementById('rankList').innerHTML = '';
        }
    }

    loadLeaderboard();
</script>
