<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusOS | The Matrix</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="themes.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; transition: background-color 0.6s ease; }

        /* ── LOADING SCREEN ── */
        #bootScreen {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; gap: 20px; transition: opacity 0.4s ease;
        }
        #bootScreen.hidden { opacity: 0; pointer-events: none; }
        .boot-logo { font-size: 2rem; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; color: var(--text-main); }
        .boot-bar { width: 200px; height: 6px; background: var(--border-color); border-radius: 50px; overflow: hidden; border: 2px solid var(--text-main); }
        .boot-bar-fill { height: 100%; background: var(--primary); border-radius: 50px; animation: bootPulse 1.2s ease-in-out infinite; }
        @keyframes bootPulse { 0%,100% { width: 20%; margin-left: 0; } 50% { width: 60%; margin-left: 20%; } }
        .boot-status { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); }

        body.ghost-active { background-color: #000000 !important; }

        /* ── FIXED SIDEBAR ── */
        .sidebar { position: fixed; top: 0; left: 0; width: 70px; height: 100vh; background: var(--panel-bg); border-right: 3px solid var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 999; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        
        /* Level Indicator (Kept CSS for future reference if needed) */
        .profile-widget { margin-bottom: 20px; display: flex; justify-content: center; width: 100%; padding: 0 7px; }
        .level-indicator {
            width: 100%; background: var(--bg-color);
            border: 2.5px solid var(--text-main); border-radius: 12px;
            padding: 8px 6px 7px; display: flex; flex-direction: column;
            align-items: center; gap: 3px;
            box-shadow: 2px 2px 0px var(--text-main);
            cursor: default; position: relative; overflow: hidden;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .level-indicator:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0px var(--text-main); }
        .level-badge-label { font-size: 0.42rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); line-height: 1; }
        .level-number { font-size: 1.5rem; font-weight: 900; line-height: 1; color: var(--primary); letter-spacing: -1px; }
        .level-rank-title { font-size: 0.38rem; font-weight: 900; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-muted); line-height: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 54px; }
        .level-xp-bar { width: 100%; height: 4px; background: var(--border-color); border-radius: 2px; overflow: hidden; margin-top: 2px; }
        .level-xp-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.6s ease-out; }
        .level-xp-text { font-size: 0.36rem; font-weight: 900; color: var(--text-muted); letter-spacing: 0.3px; font-family: 'Courier New', monospace; line-height: 1; }

        /* ── CIRCULAR LEVEL WIDGET ── */
        .circular-level-widget {
            position: relative;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-bottom: 10px;
        }
        .level-progress-ring {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }
        .ring-bg {
            fill: none;
            stroke: var(--border-color);
            stroke-width: 4;
        }
        .ring-fill {
            fill: none;
            stroke: var(--primary);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 163.36;
            stroke-dashoffset: 163.36;
            transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .level-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
            transform: translateY(1px);
        }
        .level-text {
            font-size: 0.95rem;
            font-weight: 900;
            color: var(--text-main);
            line-height: 1;
            letter-spacing: -0.5px;
        }
        .xp-pill {
            background: var(--bg-color);
            color: var(--text-main);
            font-size: 0.45rem;
            font-weight: 900;
            padding: 2px 5px;
            border-radius: 8px;
            margin-top: 3px;
            text-transform: uppercase;
            border: 1px solid var(--text-main);
            box-shadow: 1px 1px 0px var(--text-main);
        }
        
        .offline-status-bar { display: none; background: #FFE873; color: #111827; border-radius: 50%; width: 24px; height: 24px; font-size: 0.8rem; line-height: 24px; text-align: center; margin-bottom: 15px; border: 2px solid #111827; }
        body.is-offline .offline-status-bar { display: block; }

        .nav-links { display: flex; flex-direction: column; gap: 15px; width: 100%; align-items: center; flex: 1; }
        .nav-item { width: 44px; height: 44px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.1s; border: 2px solid transparent; }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 3; fill: none; }
        .nav-item:hover { color: var(--text-main); background: var(--bg-color); transform: translateY(-3px); }
        .nav-item.active { color: var(--bg-color); background: var(--text-main); border-color: var(--text-main); box-shadow: 3px 3px 0px var(--primary); }

        .logout-btn { background: none; border: none; color: var(--danger); cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: auto; width: 44px; height: 44px; transition: transform 0.1s; }
        .logout-btn:hover { transform: translateY(-3px); }
        .logout-btn svg { width: 24px; height: 24px; stroke-width: 3; }

        /* ── MAIN CONTENT AREA ── */
        .content-area { flex: 1; height: 100vh; position: relative; background: transparent; padding-left: 70px; overflow-y: auto; -webkit-overflow-scrolling: touch; z-index: 1; }
        .content-area::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 10; backdrop-filter: blur(4px); }
        body.dim-gap .content-area::before { opacity: 1; pointer-events: all; }
        #appFrame { position: relative; z-index: 2; width: 100%; height: 100%; border: none; display: block; background: transparent; }

        /* ── SHOP & CONFIG OVERLAYS ── */
        .shop-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        .shop-overlay.active { opacity: 1; pointer-events: all; }
        .shop-panel { position: fixed; top: 0; right: 0; transform: translateX(calc(100% + 50px)); width: 450px; max-width: 100vw; height: 100vh; background: var(--panel-bg); border-left: 3px solid var(--text-main); z-index: 1001; box-shadow: -10px 0 30px rgba(0,0,0,0.2); transition: transform 0.3s ease-out; display: flex; flex-direction: column; }
        .shop-panel.active { transform: translateX(0); }
        .shop-header { padding: 25px 30px; border-bottom: 3px solid var(--text-main); background: var(--bg-color); display: flex; justify-content: space-between; align-items: center; }
        .shop-title h2 { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; line-height: 1;}
        .shop-title p { font-size: 0.8rem; font-weight: 900; color: var(--gold); margin-top: 8px; display: flex; align-items: center; gap: 5px; text-transform: uppercase;}
        .close-shop { background: var(--text-main); border: none; cursor: pointer; color: var(--bg-color); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; box-shadow: 2px 2px 0px var(--danger); }
        .close-shop:active { transform: translate(2px,2px); box-shadow: 0px 0px 0px transparent; }
        .close-shop svg { width: 18px; height: 18px; stroke-width: 3; }
        .shop-tabs { display: flex; border-bottom: 3px solid var(--text-main); }
        .s-tab { flex: 1; padding: 15px; text-align: center; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; background: var(--bg-color); color: var(--text-muted); border-bottom: 3px solid transparent; margin-bottom: -3px; letter-spacing: 1px; }
        .s-tab.active { background: var(--panel-bg); color: var(--text-main); border-bottom-color: var(--primary); }
        .shop-content { padding: 25px; overflow-y: auto; flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-content: start; }
        .shop-item { border: 2px solid var(--text-main); border-radius: 12px; padding: 15px; background: var(--bg-color); display: flex; flex-direction: column; transition: transform 0.1s, box-shadow 0.1s; box-shadow: 4px 4px 0px var(--text-main); }
        .shop-item:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--text-main); }
        .item-header { display: flex; flex-direction: column; flex: 1; margin-bottom: 15px; }
        .title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 5px; margin-bottom: 8px;}
        .item-info h3 { font-size: 0.95rem; font-weight: 900; text-transform: uppercase; line-height: 1.1; }
        .item-info p { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); line-height: 1.3; }
        .item-price { background: #FFE873; color: #111827; padding: 4px 8px; border-radius: 6px; font-weight: 900; font-size: 0.7rem; border: 2px solid #111827; white-space: nowrap; }
        .buy-btn { width: 100%; padding: 10px; background: var(--primary); color: #111827; border: 2px solid var(--text-main); border-radius: 8px; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; box-shadow: 2px 2px 0px var(--text-main); transition: all 0.1s; }
        .buy-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px transparent; }
        .buy-btn.owned { background: var(--panel-bg); color: var(--text-main); }
        .buy-btn.equipped { background: var(--text-main); color: var(--bg-color); box-shadow: 2px 2px 0px var(--success); border-color: var(--success); }
        .preview-btn { background: var(--bg-color); border: 2px solid var(--text-main); border-radius: 8px; width: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 2px 2px 0px var(--text-main); color: var(--text-main); transition: all 0.1s; }
        .preview-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px transparent; }
        
        .hud-toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%); background: var(--panel-bg); border: 3px solid var(--text-main); box-shadow: 6px 6px 0px var(--text-main); color: var(--text-main); padding: 12px 20px; border-radius: 16px; z-index: 10000; display: flex; align-items: center; gap: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; max-width: 90vw; text-align: center; }
        .hud-toast-container.active { transform: translateX(-50%) translateY(0); }
        .hud-icon { background: var(--primary); color: #111827; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--text-main); flex-shrink: 0; }
        .hud-icon svg { width: 16px; height: 16px; stroke-width: 3; }

        @media (max-width: 900px) {
            body { flex-direction: column; height: 100dvh; }
            .sidebar { position: fixed; top: auto; bottom: 0; left: 0; width: 100%; height: 60px; flex-direction: row; padding: 0 10px; border-right: none; border-top: 3px solid var(--text-main); border-radius: 0; align-items: center; justify-content: space-between; box-shadow: 0px -4px 15px rgba(0,0,0,0.1); }
            .offline-status-bar { display: none !important; }
            .nav-links { flex-direction: row; width: auto; justify-content: center; gap: 15px; height: 100%; }
            .nav-item { width: 40px; height: 40px; }
            .logout-btn { margin: 0; width: 40px; height: 40px; }
            .content-area { padding-left: 0 !important; padding-bottom: 60px !important; height: 100dvh !important; }
            .shop-panel { width: 100%; }
            
            /* Sizing overrides for the circular widget */
            .circular-level-widget { width: 44px; height: 44px; margin-bottom: 0; }
            .level-text { font-size: 0.75rem; }
            .xp-pill { font-size: 0.35rem; padding: 1px 4px; margin-top: 1px; }
        }
    </style>
</head>

<script>
    // ── SERVICE WORKER ────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
                reg.addEventListener('updatefound', () => {
                    const nw = reg.installing;
                    nw.addEventListener('statechange', () => {
                        if (nw.state === 'installed' && navigator.serviceWorker.controller) nw.postMessage('SKIP_WAITING');
                    });
                });
            }).catch(e => console.warn('[SW] Registration failed:', e));
        });
    }

    // ── NETWORK ───────────────────────────────────────────────────────────
    function updateNetworkStatus() {
        if (!navigator.onLine) document.body.classList.add('is-offline');
        else {
            document.body.classList.remove('is-offline');
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller)
                navigator.serviceWorker.controller.postMessage('CACHE_CDN');
        }
    }
    window.addEventListener('online', updateNetworkStatus);
    window.addEventListener('offline', updateNetworkStatus);
    updateNetworkStatus();

    const SUPABASE_URL = 'https://xyhswdekhebcdmiyxfbo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_UsVbr-Rs8gDF-H9OdXKQEQ_qpv0Pf2m';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let PROFILE_ID = null;
    let USER_EMAIL = "";
    let globalProfile = { xp: 0, coins: 0, current_theme: 'default', current_audio: 'standard', inventory: [] };
    let currentShopTab = 'themes';
    let hudTimeout = null;

    const RANK_TIERS = [
        { title: 'Initiate', xpNeeded: 100 }, { title: 'Adept', xpNeeded: 300 },
        { title: 'Architect', xpNeeded: 700 }, { title: 'Oracle', xpNeeded: 1500 },
        { title: 'Matrix Lord', xpNeeded: 3000 }
    ];

    const SHOP_ITEMS = {
        themes: [
            { id: 'default', name: 'Clean Slate', desc: 'The default FocusOS UI.', price: 0, type: 'theme' },
            { id: 'dark', name: 'Standard Dark', desc: 'Basic dark mode.', price: 0, type: 'theme' },
            { id: 'matcha', name: 'Matcha', desc: 'Soft earth tones.', price: 100, type: 'theme' },
            { id: 'midnight', name: 'Midnight', desc: 'Deep blue hues.', price: 100, type: 'theme' },
            { id: 'autumn', name: 'Autumn Amber', desc: 'Warm orange tones.', price: 200, type: 'theme' },
            { id: 'coffee', name: 'Coffee Roaster', desc: 'Premium cafe aesthetics.', price: 300, type: 'theme' },
            { id: 'cyberpunk', name: 'Cyberpunk', desc: 'High-contrast neon.', price: 500, type: 'theme' },
            { id: 'ocean', name: 'Deep Ocean', desc: 'Cyan & deep sea blues.', price: 500, type: 'theme' },
            { id: 'sakura', name: 'Zen Sakura', desc: 'Soft pastel pinks.', price: 800, type: 'theme' }
        ],
        audio: [
            { id: 'standard', name: 'Digital Beep', desc: 'Standard alert.', price: 0, type: 'audio', url: 'https://actions.google.com/sounds/v1/alarms/beep_short.ogg' },
            { id: 'temple_gong', name: 'Temple Gong', desc: 'A resonant gong.', price: 300, type: 'audio', url: 'https://actions.google.com/sounds/v1/alarms/dinner_bell_triangle.ogg' },
            { id: 'sci_fi', name: 'Sci-Fi Synth', desc: 'Futuristic chime.', price: 500, type: 'audio', url: 'https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg' }
        ]
    };

    const LocalCache = {
        set(key, data) { try { localStorage.setItem('fos_idx_' + key, JSON.stringify({ ts: Date.now(), data })); } catch(e) {} },
        get(key) { try { const raw = localStorage.getItem('fos_idx_' + key); if (!raw) return null; return JSON.parse(raw).data; } catch(e) { return null; } }
    };

    function setBootStatus(msg) {
        const el = document.getElementById('bootStatus');
        if (el) el.innerText = msg;
    }

    function hideBoot() {
        const boot = document.getElementById('bootScreen');
        if (boot) {
            boot.classList.add('hidden');
            setTimeout(() => { if (boot.parentNode) boot.parentNode.removeChild(boot); }, 500);
        }
    }

    function calculateLevelData(currentXP) {
        let level=1, title='Initiate', prevTierXP=0, nextTierXP=100;
        for (let i=0; i<RANK_TIERS.length; i++) {
            if (currentXP < RANK_TIERS[i].xpNeeded) { level=i+1; title=RANK_TIERS[i].title; nextTierXP=RANK_TIERS[i].xpNeeded; break; }
            prevTierXP = RANK_TIERS[i].xpNeeded;
            if (i===RANK_TIERS.length-1) { level=i+2; title='Grandmaster'; nextTierXP=prevTierXP+5000; }
        }
        let xpInLevel=currentXP-prevTierXP, xpNeeded=nextTierXP-prevTierXP;
        return { level, title, progressPct: Math.max(0,Math.min(100,(xpInLevel/xpNeeded)*100)), xpInCurrentLevel:xpInLevel, xpRequiredForNext:xpNeeded };
    }

    // ── AUTH ────────────────────────────────────────────────
    async function checkAuth() {
        setBootStatus('Authenticating...');

        try {
            const { data: { user }, error } = await supabaseClient.auth.getUser();
            if (user) {
                PROFILE_ID = user.id;
                USER_EMAIL = user.email || '';
                localStorage.setItem('fos_last_user_id', user.id);
                localStorage.setItem('fos_last_user_email', user.email || '');
                return true;
            }
        } catch (err) {
            // Network error
        }

        const lastId = localStorage.getItem('fos_last_user_id');
        if (lastId) {
            PROFILE_ID = lastId;
            USER_EMAIL = localStorage.getItem('fos_last_user_email') || 'Offline';
            return true;
        }

        window.location.href = 'login.html';
        return false;
    }

    async function init() {
        setBootStatus('Loading profile...');

        const isAuth = await checkAuth();
        if (!isAuth) return; 

        const cached = LocalCache.get('profile_' + PROFILE_ID);
        if (cached) {
            globalProfile = {
                ...cached,
                inventory: cached.inventory || [],
                current_theme: cached.current_theme || 'default',
                current_audio: cached.current_audio || 'standard'
            };
            if (!globalProfile.inventory.includes('default')) globalProfile.inventory.push('default');
            if (!globalProfile.inventory.includes('dark')) globalProfile.inventory.push('dark');
            if (!globalProfile.inventory.includes('standard')) globalProfile.inventory.push('standard');
            document.documentElement.setAttribute('data-theme', globalProfile.current_theme);
            updateUI();
        }

        setBootStatus('Launching...');

        loadModule('home.html', document.querySelector('.nav-item.active'));

        hideBoot();

        if (navigator.onLine) {
            loadProfile().catch(e => console.warn('[FocusOS] Profile load failed:', e));
        }
    }

    async function loadProfile() {
        if (!navigator.onLine) return;
        try {
            const { data: profile } = await supabaseClient.from('user_profile').select('*').eq('id', PROFILE_ID).single();
            if (profile) {
                globalProfile = {
                    ...profile, inventory: profile.inventory || [],
                    current_theme: profile.current_theme || 'default',
                    current_audio: profile.current_audio || 'standard'
                };
                if (!globalProfile.inventory.includes('default')) globalProfile.inventory.push('default');
                if (!globalProfile.inventory.includes('dark')) globalProfile.inventory.push('dark');
                if (!globalProfile.inventory.includes('standard')) globalProfile.inventory.push('standard');
                document.documentElement.setAttribute('data-theme', globalProfile.current_theme);
                LocalCache.set('profile_' + PROFILE_ID, globalProfile);
                updateUI();
            }
        } catch(e) { console.warn('[FocusOS] Profile fetch error:', e); }
    }

    function updateUI() {
        const shopCoins = document.getElementById('shopCoins');
        if (shopCoins) shopCoins.innerText = globalProfile.coins || 0;

        const ld = calculateLevelData(globalProfile.xp || 0);

        // Desktop widget safely checked (avoids crash even if element is removed)
        const navLevelNum = document.getElementById('navLevelNum');
        if (navLevelNum) navLevelNum.innerText = ld.level;
        
        const rankEl = document.getElementById('navRankTitle');
        if (rankEl) rankEl.innerText = ld.title.toUpperCase();
        
        const xpFill = document.getElementById('navXpFill');
        if (xpFill) xpFill.style.width = ld.progressPct.toFixed(1) + '%';
        
        const xpText = document.getElementById('navXpText');
        if (xpText) xpText.innerText = `${ld.xpInCurrentLevel} / ${ld.xpRequiredForNext} XP`;
        
        // This existing logic now nicely applies hover text to the new circular widget
        const widget = document.getElementById('navLevelWidget');
        if (widget) widget.title = `${ld.title} — ${ld.xpInCurrentLevel}/${ld.xpRequiredForNext} XP to next level`;

        // Circular Level Widget Update
        const levelNum = document.getElementById('navLevelMobileNum');
        if (levelNum) {
            levelNum.innerText = ld.level < 10 ? '0' + ld.level : ld.level; 
        }

        const xpCurrentText = document.getElementById('navXpCurrentText');
        if (xpCurrentText) {
            xpCurrentText.innerText = globalProfile.xp || 0; 
        }

        const ringFill = document.getElementById('navLevelRingFill');
        if (ringFill) {
            const circumference = 163.36; 
            const offset = circumference - (ld.progressPct / 100) * circumference;
            ringFill.style.strokeDashoffset = offset;
        }
    }

    function loadModule(src, element) {
        document.body.classList.remove('dim-gap'); // Ensures blur clears when switching pages
        document.getElementById('appFrame').src = src; 
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if (element) element.classList.add('active');
    }

    function showHUDToast(message) {
        let toast = document.getElementById('hudToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'hudToast';
            toast.className = 'hud-toast-container';
            document.body.appendChild(toast);
        }
        toast.innerHTML = `<div class="hud-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"></polyline></svg></div><div>${message}</div>`;
        void toast.offsetWidth;
        toast.classList.add('active');
        if (hudTimeout) clearTimeout(hudTimeout);
        hudTimeout = setTimeout(() => toast.classList.remove('active'), 4000);
    }

    window.addEventListener('message', async (event) => {
        if (event.data === 'ghost_on') document.body.classList.add('ghost-active');
        if (event.data === 'ghost_off') document.body.classList.remove('ghost-active');
        if (event.data === 'dim_on') document.body.classList.add('dim-gap');
        if (event.data === 'dim_off') document.body.classList.remove('dim-gap');
        if (typeof event.data === 'string' && event.data.startsWith('matrix_toast:'))
            showHUDToast(event.data.split('matrix_toast:'));
        if (event.data === 'open_shop') {
            if (navigator.onLine) await loadProfile();
            document.getElementById('shopOverlay').classList.add('active');
            document.getElementById('shopPanel').classList.add('active');
            renderShop();
        }
        if (event.data === 'sync_bank') {
            if (navigator.onLine) await loadProfile();
        }
    });

    function closeShop() { document.getElementById('shopOverlay').classList.remove('active'); document.getElementById('shopPanel').classList.remove('active'); }
    function switchShopTab(tab, element) { currentShopTab=tab; document.querySelectorAll('.s-tab').forEach(el=>el.classList.remove('active')); element.classList.add('active'); renderShop(); }
    function previewAudio(url) { new Audio(url).play(); }

    function renderShop() {
        const container = document.getElementById('shopContent'); container.innerHTML = '';
        const items = SHOP_ITEMS[currentShopTab];
        items.forEach(item => {
            const isOwned = globalProfile.inventory.includes(item.id);
            const isEquipped = (item.type==='theme'&&globalProfile.current_theme===item.id)||(item.type==='audio'&&globalProfile.current_audio===item.id);
            let btnClass='buy-btn', btnText=item.price===0?'Acquire':`${item.price} Coins`, action=`buyItem('${item.id}','${item.type}',${item.price})`;
            if (isEquipped) { btnClass+=' equipped'; btnText='Equipped'; action=''; }
            else if (isOwned) { btnClass+=' owned'; btnText='Equip'; action=`equipItem('${item.id}','${item.type}')`; }
            let previewHtml = item.type==='audio' ? `<button class="preview-btn" onclick="previewAudio('${item.url}')" title="Test Sound"><svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>` : '';
            container.innerHTML += `<div class="shop-item"><div class="item-header"><div class="title-row"><div class="item-info"><h3>${item.name}</h3></div><div class="item-price">${item.price===0?'FREE':item.price}</div></div><div class="item-info"><p>${item.desc}</p></div></div><div style="display:flex;gap:8px;"><button class="${btnClass}" style="flex:1;" onclick="${action}">${btnText}</button>${previewHtml}</div></div>`;
        });
    }

    async function buyItem(id, type, price) {
        if (!navigator.onLine) return alert("Internet connection required to purchase items.");
        if (globalProfile.coins < price) return alert("Insufficient Vault Coins.");
        globalProfile.coins -= price; globalProfile.inventory.push(id);
        const { error } = await supabaseClient.from('user_profile').update({ coins: globalProfile.coins, inventory: globalProfile.inventory }).eq('id', PROFILE_ID);
        if (error) { alert("Database Error: " + error.message); return; }
        LocalCache.set('profile_' + PROFILE_ID, globalProfile);
        updateUI(); equipItem(id, type);
    }

    async function equipItem(id, type) {
        let updateData = {};
        if (type==='theme') { globalProfile.current_theme=id; document.documentElement.setAttribute('data-theme',id); updateData={current_theme:id}; }
        else if (type==='audio') { globalProfile.current_audio=id; updateData={current_audio:id}; }
        if (navigator.onLine) {
            try { await supabaseClient.from('user_profile').update(updateData).eq('id', PROFILE_ID); }
            catch(e) { console.warn('[FocusOS] Equip offline'); }
        }
        LocalCache.set('profile_' + PROFILE_ID, globalProfile);
        renderShop();
        const iframe = document.getElementById('appFrame');
        if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage('sync_bank', '*');
    }

    async function logout() {
        if (confirm(`Active ID: ${USER_EMAIL}\n\nDisconnect from the Matrix?`)) {
            localStorage.removeItem('fos_last_user_id');
            localStorage.removeItem('fos_last_user_email');
            try { await supabaseClient.auth.signOut(); } catch(e) {}
            window.location.href = 'login.html';
        }
    }

    function openConfigModal() {
        let cfg = globalProfile.system_config || { cl_chapter: 5.0, cl_lecture: 2.5, cl_mcq: 0.15, cl_custom: 2.0, max_safe_cl: 20.0 };
        document.getElementById('cfg_ch').value=cfg.cl_chapter; document.getElementById('cfg_lec').value=cfg.cl_lecture;
        document.getElementById('cfg_mcq').value=cfg.cl_mcq; document.getElementById('cfg_cus').value=cfg.cl_custom;
        document.getElementById('cfg_max').value=cfg.max_safe_cl;
        document.getElementById('configOverlay').classList.add('active');
        document.getElementById('configPanel').classList.add('active');
    }
    
    function closeConfigModal() { document.getElementById('configOverlay').classList.remove('active'); document.getElementById('configPanel').classList.remove('active'); }

    async function saveConfig() {
        if (!navigator.onLine) return alert("Internet connection required to save config.");
        const newCfg = {
            cl_chapter: parseFloat(document.getElementById('cfg_ch').value),
            cl_lecture: parseFloat(document.getElementById('cfg_lec').value),
            cl_mcq: parseFloat(document.getElementById('cfg_mcq').value),
            cl_custom: parseFloat(document.getElementById('cfg_cus').value),
            max_safe_cl: parseFloat(document.getElementById('cfg_max').value)
        };
        const { error } = await supabaseClient.from('user_profile').update({ system_config: newCfg }).eq('id', PROFILE_ID);
        if (error) { alert("Matrix Error: " + error.message); return; }
        globalProfile.system_config = newCfg;
        LocalCache.set('profile_' + PROFILE_ID, globalProfile);
        closeConfigModal(); showHUDToast("Matrix Recalibrated");
        document.getElementById('appFrame').contentWindow.location.reload();
    }

    init();
</script>
