<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FocusOS | Strategy Board</title>
    <link rel="stylesheet" href="themes.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Albert+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    try {
        const userId = localStorage.getItem('fos_last_user_id');
        if (userId) {
            const rawProfile = localStorage.getItem('fos_idx_profile_' + userId);
            if (rawProfile) {
                const profile = JSON.parse(rawProfile).data;
                if (profile && profile.current_theme) {
                    document.documentElement.setAttribute('data-theme', profile.current_theme);
                }
            }
        }
    } catch(e) {}
</script>

<style>
    /* ══ RESET & BASE ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; overflow: hidden; }
    body {
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: 'Albert Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        height: 100%;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    /* ══ STICKY HEADER ═════════════════════════════════════════════ */
    .page-header {
        position: sticky;
        top: 0;
        z-index: 200;
        background: var(--panel-bg);
        border-bottom: 3px solid var(--text-main);
        box-shadow: 0 4px 0px var(--text-main);
        padding: 0 24px;
        display: flex;
        align-items: center;
        gap: 14px;
        height: 62px;
        flex-shrink: 0;
    }

    .header-title {
        font-family: 'Fjalla One', sans-serif;
        font-size: 1.05rem;
        font-weight: 900;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: var(--text-main);
        flex-shrink: 0;
    }
    .header-title span { color: var(--primary); }

    .header-spacer { flex: 1; }

    /* ── Header Search Button ── */
    .header-search-btn {
        background: transparent;
        border: none;
        color: var(--text-main);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4px;
        transition: transform 0.1s;
    }
    .header-search-btn:active { transform: scale(0.9); }
    .header-search-btn svg {
        width: 20px; height: 20px;
        stroke: currentColor; stroke-width: 2.5; fill: none;
    }

    /* ── View Toggle (pill style) ── */
    .view-toggle-pill {
        position: relative;
        display: flex;
        align-items: center;
        background: var(--bg-color);
        border: 3px solid var(--text-main);
        border-radius: 50px;
        padding: 3px;
        box-shadow: 3px 3px 0px var(--text-main);
        gap: 0;
        flex-shrink: 0;
    }

    .pill-track {
        position: absolute;
        top: 3px;
        bottom: 3px;
        left: 3px;
        width: calc(50% - 3px);
        background: var(--text-main);
        border-radius: 50px;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .view-toggle-pill.archive-active .pill-track {
        transform: translateX(100%);
    }

    .pill-tab {
        position: relative;
        z-index: 1;
        padding: 6px 16px;
        font-family: 'Fjalla One', sans-serif;
        font-size: 0.7rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        border: none;
        background: transparent;
        color: var(--text-muted);
        border-radius: 50px;
        transition: color 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
    }
    .pill-tab.active { color: var(--bg-color); }
    .pill-tab svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2.5; fill: none; flex-shrink: 0; }

    /* ── Sync badge ── */
    .sync-badge {
        font-family: 'Albert Sans', sans-serif;
        font-size: 0.68rem;
        font-weight: 900;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
        white-space: nowrap;
    }
    .sync-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success, #10b981);
        border: 2px solid var(--text-main);
        animation: syncPulse 2s ease-in-out infinite;
        flex-shrink: 0;
    }
    .sync-dot.syncing { background: #f59e0b; animation: syncPulse 0.7s ease-in-out infinite; }
    .sync-dot.error { background: var(--danger); animation: none; }
    @keyframes syncPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

    /* ── Count chip ── */
    .count-chip {
        font-family: 'Albert Sans', sans-serif;
        font-size: 0.62rem;
        font-weight: 900;
        color: var(--text-muted);
        background: var(--bg-color);
        border: 2px solid var(--text-main);
        border-radius: 50px;
        padding: 3px 10px;
        box-shadow: 2px 2px 0px var(--text-main);
        flex-shrink: 0;
    }

    /* ══ SCROLLABLE CONTENT ════════════════════════════════════════ */
    .page-body {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 24px 24px 120px;
    }

    /* ══ SEARCH BAR MAIN LAYOUT ════════════════════════════════════ */
    .search-container {
        display: none;
        position: relative;
        margin-bottom: 20px;
        animation: slideDown 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .search-container.active { display: block; }
    .search-input {
        width: 100%;
        padding: 14px 44px 14px 16px;
        background: var(--panel-bg);
        border: 3px solid var(--text-main);
        border-radius: 16px;
        font-family: 'Albert Sans', sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text-main);
        outline: none;
        box-shadow: 4px 4px 0px var(--text-main);
        transition: box-shadow 0.15s;
    }
    .search-input:focus { box-shadow: 6px 6px 0px var(--primary); }
    .search-input::placeholder { opacity: 0.5; }
    
    .search-clear-btn {
        position: absolute;
        right: 14px; top: 50%; transform: translateY(-50%);
        width: 28px; height: 28px;
        background: var(--bg-color);
        border: 2px solid var(--text-main);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; color: var(--text-main);
        box-shadow: 2px 2px 0px var(--text-main);
        transition: all 0.1s;
    }
    .search-clear-btn:active { transform: translateY(-50%) translate(2px, 2px); box-shadow: 0px 0px 0px var(--text-main); }
    .search-clear-btn svg { width: 14px; height: 14px; stroke-width: 3; stroke: currentColor; fill: none;}
    
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    /* ══ CARDS GRID ════════════════════════════════════════════════ */
    .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
        gap: 20px;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
        font-weight: 900;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        border: 3px dashed var(--border-color);
        border-radius: 20px;
        grid-column: 1 / -1;
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
    }
    .empty-state:hover { border-color: var(--primary); color: var(--primary); }
    .empty-state-icon { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    /* ══ FLIP CARD ══════════════════════════════════════════════════ */
    .card-scene {
        perspective: 1000px;
        user-select: none;
        height: 220px; /* CRUSHED to ultra-density */
        cursor: pointer;
    }

    .card-flipper {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        transform-style: preserve-3d;
        display: grid;
    }

    .card-scene.is-flipped .card-flipper { transform: rotateY(180deg); }

    .card-face {
        grid-area: 1 / 1;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        border: 3px solid var(--text-main);
        border-radius: 20px;
        padding: 16px; 
        color: #111827;
        transition: transform 0.15s, box-shadow 0.15s;
        height: 100%;
    }

    .card-face-front {
        position: relative;
        z-index: 2;
        box-shadow: 6px 6px 0px var(--text-main);
        display: flex;
        flex-direction: column;
    }

    .card-scene:not(.is-flipped):hover .card-face-front {
        transform: translate(-3px, -3px);
        box-shadow: 9px 9px 0px var(--text-main);
    }

    .card-face-back {
        transform: rotateY(180deg);
        box-shadow: 6px 6px 0px var(--text-main);
        display: flex;
        flex-direction: column;
    }

    .card-scene.is-flipped:hover .card-face-back {
        transform: rotateY(180deg) translate(-3px, -3px);
        box-shadow: 9px 9px 0px var(--text-main);
    }

    /* ── Card Front ── */
    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
    }
    .card-unit-pill {
        background: rgba(255,255,255,0.55);
        border: 2px solid rgba(17,24,39,0.4);
        border-radius: 50px;
        padding: 4px 12px;
        font-family: 'Albert Sans', sans-serif;
        font-size: 0.7rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        backdrop-filter: blur(4px);
    }
    .card-stars { display: flex; gap: 1px; }
    .card-stars svg { width: 14px; height: 14px; fill: rgba(17,24,39,0.75); stroke: none; }

    .card-subject {
        font-family: 'Fjalla One', sans-serif;
        font-size: 1.4rem; /* Adjusted for smaller card */
        line-height: 1.1;
        margin-bottom: 4px;
        letter-spacing: 0.3px;
        color: #111827;
    }
    
    .card-desc {
        font-size: 0.8rem;
        font-weight: 600;
        line-height: 1.35;
        opacity: 0.75;
        margin-bottom: 12px; 
        display: -webkit-box;
        -webkit-line-clamp: 2; 
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .card-footer { margin-top: auto; }
    .progress-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
    }
    .progress-pct {
        font-family: 'Albert Sans', sans-serif;
        font-variant-numeric: tabular-nums;
        font-size: 0.6rem;
        font-weight: 900;
        opacity: 0.65;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .neo-progress-bg {
        width: 100%;
        height: 6px; 
        background: rgba(255,255,255,0.5);
        border: 1.5px solid rgba(17,24,39,0.35);
        border-radius: 50px;
        overflow: hidden;
        margin-bottom: 12px;
    }
    .neo-progress-fill {
        height: 100%;
        background: #111827;
        border-radius: 50px;
        transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card-stats {
        display: flex;
        justify-content: space-between;
    }
    .stat-block { display: flex; flex-direction: column; }
    .stat-block:nth-child(2) { align-items: center; }
    .stat-block:last-child { align-items: flex-end; }
    .stat-val {
        font-family: 'Albert Sans', sans-serif;
        font-variant-numeric: tabular-nums;
        font-size: 1.15rem;
        font-weight: 900;
        line-height: 1;
        color: #111827;
    }
    .stat-lbl {
        font-size: 0.55rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        opacity: 0.6;
        margin-top: 3px;
    }

    /* mastered overlay */
    .mastered-overlay {
        position: absolute;
        top: 12px; right: 12px;
        background: #111827;
        color: #fff;
        font-family: 'Fjalla One', sans-serif;
        font-size: 0.6rem;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 50px;
        z-index: 3;
    }

    /* ── Card Back ── */
    .back-inner {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 0;
    }
    .back-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        padding-bottom: 6px;
        border-bottom: 2px solid rgba(17,24,39,0.2);
    }
    .back-title {
        font-family: 'Fjalla One', sans-serif;
        font-size: 0.6rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0.5;
    }
    .lock-badge {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 0.55rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 2px 6px;
        border-radius: 50px;
        border: 2px solid rgba(17,24,39,0.3);
        opacity: 0.7;
    }
    .lock-badge svg { width: 8px; height: 8px; stroke: currentColor; stroke-width: 3; fill: none; }

    .intel-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px; 
        margin-bottom: 8px;
    }
    .intel-cell {
        background: rgba(255,255,255,0.45);
        border: 2px solid rgba(17,24,39,0.18);
        border-radius: 8px;
        padding: 6px 8px; 
        backdrop-filter: blur(4px);
    }
    .intel-cell-val {
        font-family: 'Albert Sans', sans-serif;
        font-variant-numeric: tabular-nums;
        font-size: 1.05rem; 
        font-weight: 900;
        color: #111827;
        line-height: 1;
    }
    .intel-cell-lbl {
        font-size: 0.5rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: rgba(17,24,39,0.55);
        margin-top: 2px;
    }

    /* deadline bar */
    .deadline-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        background: rgba(255,255,255,0.45);
        border: 2px solid rgba(17,24,39,0.18);
        border-radius: 8px;
        margin-bottom: 6px;
    }
    .deadline-icon {
        width: 24px; height: 24px;
        background: #111827;
        border-radius: 6px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }
    .deadline-icon svg { width: 12px; height: 12px; stroke: #fff; stroke-width: 2.5; fill: none; }
    .deadline-info { flex: 1; }
    .deadline-label { font-size: 0.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; opacity: 0.55; }
    .deadline-value {
        font-family: 'Albert Sans', sans-serif;
        font-variant-numeric: tabular-nums;
        font-size: 0.75rem; 
        font-weight: 900;
        color: #111827;
    }

    /* ── Action buttons on card ── */
    .delete-btn {
        position: absolute;
        top: -10px; right: -10px;
        width: 32px; height: 32px;
        background: #FF4747;
        border: 2px solid #111827;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        box-shadow: 2px 2px 0px #111827;
        color: white;
        z-index: 10;
        transform: translateZ(1px); 
        transition: transform 0.1s, box-shadow 0.1s;
    }
    .delete-btn:active { transform: translate(2px, 2px) translateZ(1px); box-shadow: 0px 0px 0px #111827; }
    .delete-btn svg { width: 14px; height: 14px; stroke-width: 3; }

    .edit-btn {
        position: absolute;
        top: -10px; right: 32px;
        width: 32px; height: 32px;
        background: var(--primary);
        border: 2px solid #111827;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        box-shadow: 2px 2px 0px #111827;
        color: #111827;
        z-index: 10;
        transform: translateZ(1px); 
        transition: transform 0.1s, box-shadow 0.1s;
    }
    .edit-btn:active { transform: translate(2px, 2px) translateZ(1px); box-shadow: 0px 0px 0px #111827; }
    .edit-btn svg { width: 14px; height: 14px; stroke-width: 3; }

    /* ══ FAB ════════════════════════════════════════════════════════ */
    .fab {
        position: fixed;
        bottom: max(30px, env(safe-area-inset-bottom, 30px));
        right: 24px;
        width: 60px; height: 60px;
        background: var(--primary);
        border: 3px solid var(--text-main);
        border-radius: 50%;
        box-shadow: 5px 5px 0px var(--text-main);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        z-index: 200;
        transition: transform 0.15s, box-shadow 0.15s;
        color: white;
        touch-action: manipulation;
    }
    .fab:active { transform: translate(5px, 5px); box-shadow: 0px 0px 0px var(--text-main); }
    .fab svg { width: 28px; height: 28px; stroke: white; stroke-width: 3; transition: transform 0.3s ease-out; pointer-events: none; }
    .fab.is-open svg { transform: rotate(45deg); }
    @keyframes fabPulse {
        0%, 100% { box-shadow: 5px 5px 0px var(--text-main), 0 0 0 0 rgba(107,164,237,0.35); }
        70% { box-shadow: 5px 5px 0px var(--text-main), 0 0 0 14px rgba(107,164,237,0); }
    }
    .fab:not(.is-open) { animation: fabPulse 2.8s ease-out 1.5s 3; }

    /* ══ FORM DRAWER ════════════════════════════════════════════════ */
    .form-drawer-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 250; 
        opacity: 0; pointer-events: none;
        transition: opacity 0.3s;
        backdrop-filter: blur(4px);
    }
    .form-drawer-overlay.is-open { opacity: 1; pointer-events: all; }

    .form-drawer {
        position: fixed;
        top: 0; left: 50%;
        transform: translateX(-50%) translateY(-110%);
        width: min(500px, calc(100vw - 32px));
        max-height: 90vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        z-index: 260; 
        transition: transform 0.3s ease-out;
    }

    .form-drawer.is-open { transform: translateX(-50%) translateY(20px); }

    .form-panel {
        background: var(--panel-bg);
        border: 3px solid var(--text-main);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 8px 8px 0px var(--text-main);
    }

    .form-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .form-panel-title {
        font-family: 'Fjalla One', sans-serif;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-main);
    }
    .form-close-btn {
        width: 36px; height: 36px;
        background: var(--bg-color);
        border: 2px solid var(--text-main);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        box-shadow: 2px 2px 0px var(--text-main);
        transition: all 0.1s;
        color: var(--text-main);
    }
    .form-close-btn:active { transform: translate(2px,2px); box-shadow: 0px 0px 0px var(--text-main); }
    .form-close-btn svg { width: 16px; height: 16px; stroke-width: 3; }

    .form-group { margin-bottom: 14px; }
    .form-label {
        display: block;
        font-size: 0.65rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        margin-bottom: 6px;
        color: var(--text-main);
        opacity: 0.75;
    }
    .neo-input {
        width: 100%;
        padding: 10px 13px;
        background: var(--bg-color);
        border: 2px solid var(--text-main);
        border-radius: 10px;
        font-family: 'Albert Sans', sans-serif;
        font-size: max(16px, 0.9rem);
        font-weight: 700;
        color: var(--text-main);
        outline: none;
        transition: box-shadow 0.15s;
        display: block;
    }
    .neo-input:focus { box-shadow: 3px 3px 0px var(--primary); }
    .input-error { border-color: #FF4747 !important; box-shadow: 3px 3px 0px #FF4747 !important; }
    textarea.neo-input { resize: none; min-height: 52px; font-weight: 600; }
    input[type="date"].neo-input { -webkit-appearance: none; min-height: 42px; }
    input[type="number"].neo-input { -moz-appearance: textfield; }
    input[type="number"].neo-input::-webkit-inner-spin-button,
    input[type="number"].neo-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .row-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .unit-toggle { display: flex; gap: 6px; }
    .unit-btn {
        flex: 1; padding: 8px 0;
        background: var(--bg-color);
        border: 2px solid var(--text-main);
        border-radius: 8px;
        font-family: 'Albert Sans', sans-serif;
        font-weight: 900; font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.1s;
        color: var(--text-main);
        box-shadow: 2px 2px 0px var(--text-main);
        touch-action: manipulation;
    }
    .unit-btn.active {
        background: var(--text-main);
        color: var(--bg-color);
        transform: translate(2px, 2px);
        box-shadow: 0px 0px 0px var(--text-main);
    }

    .star-rating { display: flex; gap: 5px; cursor: pointer; }
    .star {
        width: 26px; height: 26px;
        fill: transparent;
        stroke: var(--text-main); stroke-width: 2.5;
        transition: all 0.15s;

    /* ══ CONFIRM MODAL ══════════════════════════════════════════════ */
    .confirm-modal-overlay {

    .tap-hint { display: none; }

</button>

<script>
    // ══ OFFLINE QUEUE ══════════════════════════════════════════════════
    const OfflineQueue = {
        DB_NAME: 'focusos_queue', STORE: 'pending_ops', _db: null,
        async open() {
            if (this._db) return this._db;
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(this.DB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(this.STORE, { autoIncrement: true });
                req.onsuccess = e => { this._db = e.target.result; resolve(this._db); };
                req.onerror = () => reject(req.error);
            });
        },
        async push(op) {
            const db = await this.open();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(this.STORE, 'readwrite');
                tx.objectStore(this.STORE).add({ ...op, _queuedAt: Date.now() });
                tx.oncomplete = resolve; tx.onerror = () => reject(tx.error);
            });
        },
        async getAllWithKeys() {
            const db = await this.open();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(this.STORE, 'readonly');
                const results = [];
                const cursor = tx.objectStore(this.STORE).openCursor();
                cursor.onsuccess = e => { const c = e.target.result; if (c) { results.push({ key: c.key, value: c.value }); c.continue(); } else resolve(results); };
                cursor.onerror = () => reject();
            });
        },
        async deleteKey(key) {
            const db = await this.open();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(this.STORE, 'readwrite');
                tx.objectStore(this.STORE).delete(key);
                tx.oncomplete = resolve; tx.onerror = () => reject(tx.error);
            });
        }
    };

    const LocalCache = {
        TTL: 24 * 60 * 60 * 1000,
        set(key, data) { try { localStorage.setItem('fos_' + key, JSON.stringify({ ts: Date.now(), data })); } catch(e) {} },
        get(key) {
            try {
                const raw = localStorage.getItem('fos_' + key); if (!raw) return null;
                const p = JSON.parse(raw);
                if (Date.now() - p.ts > this.TTL) { localStorage.removeItem('fos_' + key); return null; }
                return p.data;
            } catch(e) { return null; }
        }
    };

    async function executeDbOp(op) {
        const sb = supabaseClient;
        if (op.type === 'insert') return await sb.from(op.table).insert([op.data]);
        if (op.type === 'update') { let q = sb.from(op.table).update(op.data); for (const [k,v] of Object.entries(op.match)) q=q.eq(k,v); return await q; }
        if (op.type === 'delete') { let q = sb.from(op.table).delete(); for (const [k,v] of Object.entries(op.match)) q=q.eq(k,v); return await q; }
    }

    async function safeDbWrite(operation) {
        if (!navigator.onLine) { await OfflineQueue.push(operation); return { queued: true }; }
        try { return await executeDbOp(operation); }
        catch(e) { await OfflineQueue.push(operation); return { queued: true }; }
    }

    async function flushOfflineQueue() {
        if (!navigator.onLine) return;
        let items; try { items = await OfflineQueue.getAllWithKeys(); } catch(e) { return; }
        if (!items || items.length === 0) return;
        for (const item of items) {
            try { await executeDbOp(item.value); await OfflineQueue.deleteKey(item.key); } catch(e) {}
        }
    }

    // ══ SYNC INDICATOR ════════════════════════════════════════════════
    function setSyncStatus(state) {
        const dot = document.getElementById('syncDot');
        const text = document.getElementById('syncText');
        dot.className = 'sync-dot';
        if (state === 'live') { text.textContent = 'Live'; }
        else if (state === 'syncing') { dot.classList.add('syncing'); text.textContent = 'Syncing'; }
        else if (state === 'offline') { dot.classList.add('error'); text.textContent = 'Offline'; }
        else if (state === 'error') { dot.classList.add('error'); text.textContent = 'Error'; }
    }

    window.addEventListener('online', () => {
        document.getElementById('offlineBanner').classList.remove('visible');
        setSyncStatus('syncing');
        flushOfflineQueue().then(loadTasks);
    });
    window.addEventListener('offline', () => {
        document.getElementById('offlineBanner').classList.add('visible');
        setSyncStatus('offline');
    });

    // ══ MAIN APP ══════════════════════════════════════════════════════
    const SUPABASE_URL = 'https://xyhswdekhebcdmiyxfbo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_UsVbr-Rs8gDF-H9OdXKQEQ_qpv0Pf2m';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let PROFILE_ID = null;
    let selectedUnit = 'Ch.';
    let selectedPriority = 3;
    let editingTaskId = null;
    let activeTasksData = [];
    let currentViewMode = 'active';
    let isDeadlineLocked = false;
    let drawerOpen = false;
    let taskToDelete = null;

    const SUBJECT_COLORS = ['#6ba4ed','#ff6b81','#10b981','#f59e0b','#8a65e8','#0ea5e9','#ec407a','#f43f5e','#8b5cf6','#14b8a6'];

    function lightTap() { if (navigator.vibrate) navigator.vibrate(15); }
    function heavyTap() { if (navigator.vibrate) navigator.vibrate(40); }

    function setupEventListeners() {
        document.querySelectorAll('.star').forEach(s => {
            s.addEventListener('click', (e) => {
                lightTap();
                selectedPriority = parseInt(e.currentTarget.getAttribute('data-val'));
                document.querySelectorAll('.star').forEach(st => st.classList.toggle('active', parseInt(st.getAttribute('data-val')) <= selectedPriority));
            });
        });
        document.querySelectorAll('.neo-input').forEach(input => {
            input.addEventListener('focus', function() { setTimeout(() => this.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300); });
            input.addEventListener('input', function() { this.classList.remove('input-error'); });
        });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && drawerOpen) closeDrawer(); });
        window.addEventListener('message', async (event) => {
            if (event.data === 'sync_bank') {
                if (!navigator.onLine) return;
                const { data } = await supabaseClient.from('user_profile').select('current_theme').eq('id', PROFILE_ID).single();
                if (data) document.documentElement.setAttribute('data-theme', data.current_theme);
            }
        });
    }

    async function init() {
        const isAuth = await checkAuth();
        if (!isAuth) return;

        if (!navigator.onLine) {
            document.getElementById('offlineBanner').classList.add('visible');
            setSyncStatus('offline');
        } else { setSyncStatus('syncing'); }

        const cachedProfile = LocalCache.get('profile_' + PROFILE_ID);
        const cachedTasks = LocalCache.get('tasks');
        if (cachedProfile) document.documentElement.setAttribute('data-theme', cachedProfile.current_theme);
        if (cachedTasks) { activeTasksData = cachedTasks; renderTasks(); }

        setupEventListeners();

        if (navigator.onLine) await loadTasks();

        let d = new Date(); d.setDate(d.getDate() + 14);
        document.getElementById('f_deadline').value = d.toISOString().split('T');
    }

    async function checkAuth() {
        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) { PROFILE_ID = user.id; localStorage.setItem('fos_last_user_id', user.id); return true; }
        } catch(err) {}
        const lastId = localStorage.getItem('fos_last_user_id');
        if (lastId) { PROFILE_ID = lastId; return true; }
        if (window.parent !== window) window.parent.postMessage('auth_required', '*');
        else window.location.href = 'login.html';
        return false;
    }

    // ══ SEARCH ════════════════════════════════════════════════════════
    function toggleSearchBar() {
        lightTap();
        const container = document.getElementById('searchContainer');
        container.classList.toggle('active');
        if(container.classList.contains('active')) {
            document.getElementById('searchInput').focus();
        } else {
            document.getElementById('searchInput').value = '';
            renderTasks();
        }
    }

    function clearSearch() {
        lightTap();
        document.getElementById('searchInput').value = '';
        document.getElementById('searchInput').focus();
        renderTasks();
    }

    function isFuzzyMatch(query, targetString) {
        if (!query) return true;
        query = query.toLowerCase().trim();
        targetString = targetString.toLowerCase();
        
        // Exact substring hit
        if (targetString.includes(query)) return true;

        // Typo tolerance (allow up to 2 character edits for longer words)
        const queryTerms = query.split(/\s+/);
        const targetTerms = targetString.split(/\s+/);

        return queryTerms.every(qTerm => {
            return targetTerms.some(tTerm => {
                if (tTerm.includes(qTerm)) return true;
                if (qTerm.length > 3) {
                    let edits = 0, i = 0, j = 0;
                    while (i < qTerm.length && j < tTerm.length) {
                        if (qTerm[i] !== tTerm[j]) {
                            edits++;
                            if (qTerm[i+1] === tTerm[j]) i++; 
                            else if (qTerm[i] === tTerm[j+1]) j++; 
                            else { i++; j++; } 
                        } else { i++; j++; }
                    }
                    edits += (qTerm.length - i) + (tTerm.length - j);
                    return edits <= 2; 
                }
                return false;
            });
        });
    }

    // ══ DRAWER ═══════════════════════════════════════════════════════
    function openDrawer() {
        drawerOpen = true;
        document.getElementById('formDrawer').classList.add('is-open');
        document.getElementById('drawerOverlay').classList.add('is-open');
        document.getElementById('fabBtn').classList.add('is-open');
        if (!window.matchMedia('(hover: none) and (pointer: coarse)').matches)
            setTimeout(() => document.getElementById('f_subject').focus(), 400);
    }

    function closeDrawer() {
        drawerOpen = false;
        document.getElementById('formDrawer').classList.remove('is-open');
        document.getElementById('drawerOverlay').classList.remove('is-open');
        document.getElementById('fabBtn').classList.remove('is-open');
        if (editingTaskId) {
            editingTaskId = null;
            document.getElementById('submitBtn').innerText = "Deploy Mission";
            document.getElementById('submitBtn').style.cssText = '';
            document.getElementById('drawerTitle').innerText = "New Mission";
            clearForm();
        }
    }

    function toggleDrawer() {
        lightTap();
        if (drawerOpen) closeDrawer();
        else { if (!editingTaskId) { document.getElementById('drawerTitle').innerText = "New Mission"; clearForm(); } openDrawer(); }
    }

    function clearForm() {
        document.getElementById('f_subject').value = '';
        document.getElementById('f_desc').value = '';
        document.getElementById('f_work').value = '';
        selectedPriority = 3;
        document.querySelectorAll('.star').forEach(st => st.classList.toggle('active', parseInt(st.getAttribute('data-val')) <= 3));
        document.querySelectorAll('.neo-input').forEach(i => i.classList.remove('input-error', 'shake'));
        setUnit('Ch.'); toggleLockState(false);
        let d = new Date(); d.setDate(d.getDate() + 14);
        document.getElementById('f_deadline').value = d.toISOString().split('T');
    }

    // ══ VIEW TOGGLE ═══════════════════════════════════════════════════
    function switchView(mode) {
        lightTap();
        currentViewMode = mode;
        const pill = document.getElementById('viewTogglePill');
        pill.classList.toggle('archive-active', mode === 'archive');
        document.getElementById('tabActive').classList.toggle('active', mode === 'active');
        document.getElementById('tabArchive').classList.toggle('active', mode === 'archive');
        renderTasks();
    }

    // ══ FORM HELPERS ══════════════════════════════════════════════════
    function setUnit(u) {
        lightTap(); selectedUnit = u;
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.toggle('active', b.innerText.trim() === u.trim() || (u === 'MCQs' && b.innerText.trim() === 'MCQ')));
    }

    function toggleLockState(forceState = null) {
        if (forceState !== null) isDeadlineLocked = forceState; else isDeadlineLocked = !isDeadlineLocked;
        const btn = document.getElementById('btnLockToggle');
        document.getElementById('lockText').innerText = isDeadlineLocked ? 'Locked' : 'Elastic';
        document.getElementById('iconUnlock').style.display = isDeadlineLocked ? 'none' : 'block';
        document.getElementById('iconLock').style.display = isDeadlineLocked ? 'block' : 'none';
        btn.classList.toggle('locked', isDeadlineLocked);
    }

    // ══ LOAD & RENDER ═════════════════════════════════════════════════
    async function loadTasks() {
        if (!navigator.onLine) { renderTasks(); setSyncStatus('offline'); return; }
        setSyncStatus('syncing');
        const { data, error } = await supabaseClient.from('study_tasks').select('*').order('priority', { ascending: false });
        if (error) { console.error(error); setSyncStatus('error'); return; }
        activeTasksData = data;
        LocalCache.set('tasks', data);
        renderTasks();
        setSyncStatus('live');
        await flushOfflineQueue();
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        const now = new Date().getTime();
        let renderedCount = 0;
        let uniqueSubjects = [...new Set(activeTasksData.map(t => t.subject))].sort();
        const searchQuery = document.getElementById('searchInput') ? document.getElementById('searchInput').value : '';

        activeTasksData.forEach(task => {
            const remain = task.total_work - (task.completed_work || 0);
            const isMastered = remain <= 0;
            if (currentViewMode === 'active' && isMastered) return;
            if (currentViewMode === 'archive' && !isMastered) return;

            // Search Filter
            const deadlineStr = new Date(task.deadline).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const searchableData = `${task.subject} ${task.description || ''} ${task.total_work} ${task.unit} ${deadlineStr}`;
            if (!isFuzzyMatch(searchQuery, searchableData)) return;

            renderedCount++;

            const deadlineTime = new Date(task.deadline).getTime();
            const daysLeft = Math.max(0, Math.ceil((deadlineTime - now) / (1000 * 3600 * 24)));
            const dailyRate = isMastered ? 0 : Math.ceil(remain / Math.max(1, daysLeft));
            const progressPct = Math.min(100, Math.round(((task.completed_work || 0) / task.total_work) * 100));
            const subjectIdx = uniqueSubjects.indexOf(task.subject);
            const cardColor = isMastered ? '#c8d0dd' : SUBJECT_COLORS[subjectIdx % SUBJECT_COLORS.length];
            const contentOpacity = isMastered ? '0.45' : '1';

            const lockIconHTML = task.is_locked
                ? `<div class="lock-badge">
                    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Locked
                   </div>` : '';

            // Stars HTML
            let starsHTML = '';
            for (let i = 0; i < task.priority; i++) {
                starsHTML += `<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
            }

            const editBtnHTML = isMastered ? '' : `<button class="edit-btn" title="Edit" onclick="editTask('${task.id}', event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>`;

            const masteredBadge = isMastered ? `<div class="mastered-overlay">✓ Mastered</div>` : '';

            const card = document.createElement('div');
            card.className = 'card-scene';
            card.addEventListener('click', function(e) {
                if (e.target.closest('.delete-btn') || e.target.closest('.edit-btn')) return;
                lightTap();
                this.classList.toggle('is-flipped');
            });

            card.innerHTML = `
            <div class="card-flipper">

                <div class="card-face card-face-front" style="background-color:${cardColor};">
                    ${masteredBadge}
                    <div style="opacity:${contentOpacity}; display:flex; flex-direction:column; flex:1;">
                        <div class="card-header">
                            <div class="card-unit-pill">${task.total_work} ${task.unit}</div>
                            <div class="card-stars">${starsHTML}</div>
                        </div>
                        <div class="card-subject">${task.subject}</div>
                        <div class="card-desc">${task.description || 'No parameters defined.'}</div>
                        <div class="card-footer">
                            <div class="progress-row">
                                <span class="progress-pct">${task.completed_work || 0} / ${task.total_work} ${task.unit}</span>
                                <span class="progress-pct">${progressPct}%</span>
                            </div>
                            <div class="neo-progress-bg">
                                <div class="neo-progress-fill" style="width:${progressPct}%;"></div>
                            </div>
                            <div class="card-stats">
                                <div class="stat-block">
                                    <div class="stat-val">${isMastered ? '∞' : daysLeft}</div>
                                    <div class="stat-lbl">Days Left</div>
                                </div>
                                <div class="stat-block">
                                    <div class="stat-val">${dailyRate}</div>
                                    <div class="stat-lbl">${task.unit}/Day</div>
                                </div>
                                <div class="stat-block">
                                    <div class="stat-val">${remain > 0 ? remain : '—'}</div>
                                    <div class="stat-lbl">Remaining</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-face card-face-back" style="background-color:${cardColor};">
                    <button class="delete-btn" title="Delete" onclick="deleteTask('${task.id}', event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                    ${editBtnHTML}

                    <div class="back-inner" style="opacity:${contentOpacity};">
                        <div class="back-header">
                            <span class="back-title">Mission Intel</span>
                            ${lockIconHTML}
                        </div>

                        <div class="intel-grid">
                            <div class="intel-cell">
                                <div class="intel-cell-val">${progressPct}%</div>
                                <div class="intel-cell-lbl">Mastery</div>
                            </div>
                            <div class="intel-cell">
                                <div class="intel-cell-val">${dailyRate}</div>
                                <div class="intel-cell-lbl">${task.unit} / Day</div>
                            </div>
                            <div class="intel-cell">
                                <div class="intel-cell-val">${task.completed_work || 0}</div>
                                <div class="intel-cell-lbl">Completed</div>
                            </div>
                            <div class="intel-cell">
                                <div class="intel-cell-val">${remain > 0 ? remain : '0'}</div>
                                <div class="intel-cell-lbl">Remaining</div>
                            </div>
                        </div>

                        <div class="deadline-row">
                            <div class="deadline-icon">
                                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            </div>
                            <div class="deadline-info">
                                <div class="deadline-label">Deadline</div>
                                <div class="deadline-value">${deadlineStr}</div>
                            </div>
                            <div style="font-family:'Albert Sans',sans-serif;font-variant-numeric:tabular-nums;font-size:0.75rem;font-weight:900;color:#111827;opacity:0.6;">${isMastered ? '✓' : daysLeft + 'd'}</div>
                        </div>

                    </div>
                </div>

            </div>`;
            list.appendChild(card);
        });

        // Update count chip
        const chipEl = document.getElementById('countChip');
        chipEl.textContent = renderedCount === 1 ? '1 Mission' : `${renderedCount} Missions`;

        if (renderedCount === 0) {
            if (searchQuery) {
                list.innerHTML = `<div class="empty-state" onclick="clearSearch()">
                    <span class="empty-state-icon">🔍</span>
                    No intel found.<br>
                    <span style="color:var(--primary);font-size:0.8rem;">Tap to clear search</span>
                </div>`;
            } else if (currentViewMode === 'active') {
                list.innerHTML = `<div class="empty-state" onclick="toggleDrawer()">
                    <span class="empty-state-icon">⚡</span>
                    Matrix is clear.<br>
                    <span style="color:var(--primary);font-size:0.8rem;">Tap to deploy first mission</span>
                </div>`;
            } else {
                list.innerHTML = `<div class="empty-state">
                    <span class="empty-state-icon">🗄️</span>
                    Archive is empty.<br>
                    <span style="font-size:0.8rem;opacity:0.6;">No completed missions yet.</span>
                </div>`;
            }
        }
    }

    // ══ EDIT ══════════════════════════════════════════════════════════
    function editTask(id, event) {
        event.stopPropagation();
        const task = activeTasksData.find(t => t.id === id);
        if (!task) return;
        document.getElementById('f_subject').value = task.subject;
        document.getElementById('f_desc').value = task.description || '';
        document.getElementById('f_work').value = task.total_work;
        document.getElementById('f_deadline').value = task.deadline;
        setUnit(task.unit);
        selectedPriority = task.priority;
        document.querySelectorAll('.star').forEach(st => st.classList.toggle('active', parseInt(st.getAttribute('data-val')) <= selectedPriority));
        toggleLockState(task.is_locked || false);
        editingTaskId = id;
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Update Mission";
        btn.style.background = "#FFB86B";
        btn.style.color = "#111827";
        document.getElementById('drawerTitle').innerText = "Edit Mission";
        openDrawer();
    }

    // ══ DEPLOY ════════════════════════════════════════════════════════
    async function deployTask() {
        heavyTap();
        const subjectInput = document.getElementById('f_subject');
        const workInput = document.getElementById('f_work');
        const deadlineInput = document.getElementById('f_deadline');
        const subject = subjectInput.value.trim();
        const desc = document.getElementById('f_desc').value.trim();
        const work = parseInt(workInput.value);
        const deadline = deadlineInput.value;
        let isValid = true;

        [subjectInput, workInput, deadlineInput].forEach(el => { el.classList.remove('input-error', 'shake'); void el.offsetWidth; });
        if (!subject) { subjectInput.classList.add('input-error'); isValid = false; }
        if (!workInput.value || isNaN(work) || work < 1) { workInput.classList.add('input-error'); isValid = false; }
        if (!deadline) { deadlineInput.classList.add('input-error'); isValid = false; }
        if (!isValid) {
            const panel = document.getElementById('mainFormPanel');
            panel.classList.remove('shake'); void panel.offsetWidth; panel.classList.add('shake');
            return;
        }

        if (editingTaskId) {
            const updateData = { title: subject, subject, description: desc, total_work: work, unit: selectedUnit, priority: selectedPriority, deadline, is_locked: isDeadlineLocked };
            const idx = activeTasksData.findIndex(t => t.id === editingTaskId);
            if (idx > -1) { activeTasksData[idx] = { ...activeTasksData[idx], ...updateData }; LocalCache.set('tasks', activeTasksData); }
            await safeDbWrite({ type: 'update', table: 'study_tasks', data: updateData, match: { id: editingTaskId } });
            editingTaskId = null;
            document.getElementById('submitBtn').innerText = "Deploy Mission";
            document.getElementById('submitBtn').style.cssText = '';
            document.getElementById('drawerTitle').innerText = "New Mission";
        } else {
            const newTask = { user_id: PROFILE_ID, title: subject, subject, description: desc, total_work: work, completed_work: 0, unit: selectedUnit, priority: selectedPriority, deadline, time_invested: 0, is_locked: isDeadlineLocked };
            const tempId = 'temp_' + Date.now();
            activeTasksData.unshift({ ...newTask, id: tempId });
            LocalCache.set('tasks', activeTasksData);
            renderTasks();
            await safeDbWrite({ type: 'insert', table: 'study_tasks', data: newTask });
            if (navigator.onLine) setTimeout(loadTasks, 500);
        }

        closeDrawer(); clearForm();
        if (currentViewMode === 'archive') switchView('active');
        else renderTasks();
    }

    // ══ DELETE ════════════════════════════════════════════════════════
    function deleteTask(id, event) {
        event.stopPropagation(); heavyTap();
        taskToDelete = id;
        document.getElementById('confirmDesc').innerText = currentViewMode === 'archive'
            ? 'Purge this operation from the Archive? Flashcards will be permanently destroyed.'
            : 'Terminate this deployment? All progress and flashcards will be wiped.';
        document.getElementById('confirmModalOverlay').classList.add('active');
    }

    function cancelPurge(e) {
        if (e && e.target !== e.currentTarget) return;
        lightTap(); taskToDelete = null;
        document.getElementById('confirmModalOverlay').classList.remove('active');
    }

    async function confirmPurge() {
        heavyTap(); if (!taskToDelete) return;
        const btn = document.querySelector('.btn-purge');
        btn.textContent = 'Purging…'; btn.style.pointerEvents = 'none';
        activeTasksData = activeTasksData.filter(t => t.id !== taskToDelete);
        LocalCache.set('tasks', activeTasksData); renderTasks();
        await safeDbWrite({ type: 'delete', table: 'study_tasks', match: { id: taskToDelete } });
        if (navigator.onLine) setTimeout(loadTasks, 300);
        btn.textContent = 'Purge'; btn.style.pointerEvents = 'auto';
        cancelPurge();
    }

    init();
</script>

</body>
</html>
