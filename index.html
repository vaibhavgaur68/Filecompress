<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ================================================
       DESIGN TOKENS — Deep Dark / Neon Accents
    ================================================ */
    :root {
      --bg: #07070a;
      --surface: #12121a;
      --surface-hover: #1c1c28;
      --border: #2a2a34;
      --text-main: #ebebf0;
      --text-muted: #9898a8;
      --f-display: 'Syne', sans-serif;
      --f-mono: 'DM Mono', monospace;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 70%);
      color: var(--text-main);
      font-family: var(--f-mono);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header / Welcome ── */
    header {
      text-align: center;
      padding: 80px 24px 20px;
    }
    
    h1 {
      font-family: var(--f-display);
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
    }
    
    header p {
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto;
      font-size: 1rem;
    }

    /* ── Static Live Search Bar w/ Icons ── */
    .search-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 32px;
      padding: 0 20px;
    }

    .search-container {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 420px;
      height: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 0 16px 0 20px;
      transition: all 0.2s;
    }

    .search-container:focus-within {
      border-color: var(--text-muted);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .search-icon {
      color: var(--text-muted);
      opacity: 0.6;
      margin-right: 12px;
      flex-shrink: 0;
    }

    #searchInput {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-main);
      font-family: var(--f-mono);
      font-size: 1rem;
      outline: none;
      -webkit-appearance: none;
      min-width: 0; /* Prevents flexbox stretching issues */
    }

    #searchInput::placeholder { color: var(--text-muted); opacity: 0.5; }

    #clearSearchBtn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: none; /* Hidden by default */
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      margin-left: 8px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #clearSearchBtn.visible {
      display: flex;
    }

    #clearSearchBtn:hover {
      color: var(--text-main);
      background: rgba(255,255,255,0.1);
    }

    /* ── Main Grid Layout ── */
    main {
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    /* ── Tool Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: all 0.2s ease-out;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent, #555);
      opacity: 0.4;
      transition: opacity 0.2s;
    }

    .card:hover {
      background: var(--surface-hover);
      transform: translateY(-4px);
      border-color: var(--accent, var(--border));
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }
    
    .card:hover::before { opacity: 1; }
    .card.disabled { opacity: 0.5; pointer-events: none; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-icon {
      font-size: 1.8rem;
      background: rgba(255,255,255,0.05);
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
    }

    .card-status {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .card h2 {
      font-family: var(--f-display);
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card p {
      color: var(--text-muted);
      font-size: 0.9rem;
      flex: 1;
    }

    /* ── Footer / About ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      background: rgba(7,7,10,0.8);
    }

    .footer-content { max-width: 600px; margin: 0 auto; }
  </style>
</head>
<body>

  <header>
    <h1>The Workspace</h1>
    <p>A collection of privacy-first, client-side utilities and applications.</p>
    
    <div class="search-wrapper">
      <div class="search-container">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="16" height="16" fill="currentColor">
          <path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"/>
        </svg>

        <input type="text" id="searchInput" placeholder="Search utilities..." autocomplete="off">
        
        <button id="clearSearchBtn" aria-label="Clear search">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" width="14" height="14" fill="currentColor">
            <path d="M342.6 150.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192 210.7 86.6 105.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L146.7 256 41.4 361.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192 301.3 297.4 406.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.3 256 342.6 150.6z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="tools-grid" id="toolsGrid">
      </div>
  </main>

  <footer>
    <div class="footer-content">
      <p style="margin-bottom: 8px;"><strong>The Workspace</strong> built by Vaibhav.</p>
      <p>100% Local Execution. No data is ever collected or sent to a server.</p>
      <p style="margin-top: 16px; font-size: 0.75rem; color: #34d399; opacity: 0.7;">System operational.</p>
    </div>
  </footer>

  <script>
    // ==========================================
    // TOOL DIRECTORY DATA
    // ==========================================
    const tools = [
      {
        id: 'Squish',
        name: 'Squish',
        desc: 'Iterative file compressor. Handles images and PDFs. Nuke-on-save architecture.',
        url: '/nullpress', 
        icon: '⚡',
        accent: '#22d3ee',
        status: 'Active'
      },
      {
        id: 'cutout',
        name: 'CutOut',
        desc: 'Browser-based background removal using Fuzzy Flood Fill and K-Means clustering.',
        url: '/cutout', 
        icon: '🖼',
        accent: '#c8ff00',
        status: 'Active'
      },
    ];

    // ==========================================
    // RENDER LOGIC
    // ==========================================
    const grid = document.getElementById('toolsGrid');

    function renderTools(dataToRender) {
      if (dataToRender.length === 0) {
        grid.innerHTML = `<div class="empty-state">No matching tools found. Try adjusting your search.</div>`;
        return;
      }

      grid.innerHTML = dataToRender.map(tool => {
        const isDisabled = tool.url === '#' ? 'disabled' : '';
        const statusStyle = tool.status === 'Active' ? `color: ${tool.accent}; border-color: ${tool.accent}40; background: ${tool.accent}10;` : '';
        
        return `
          <a href="${tool.url}" class="card ${isDisabled}" style="--accent: ${tool.accent}">
            <div class="card-header">
              <div class="card-icon" style="color: ${tool.accent}">${tool.icon}</div>
              <div class="card-status" style="${statusStyle}">${tool.status}</div>
            </div>
            <h2>${tool.name}</h2>
            <p>${tool.desc}</p>
          </a>
        `;
      }).join('');
    }

    // ==========================================
    // LIVE SEARCH & FUZZY MATCH LOGIC
    // ==========================================
    const searchInput = document.getElementById('searchInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');

    // 1. Execute instantly as the user types and toggle X button
    searchInput.addEventListener('input', () => {
      if (searchInput.value.length > 0) {
        clearSearchBtn.classList.add('visible');
      } else {
        clearSearchBtn.classList.remove('visible');
      }
      executeSearch();
    });

    // 2. Clear button functionality
    clearSearchBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearSearchBtn.classList.remove('visible');
      executeSearch();
      searchInput.focus(); // Keep the user's cursor in the box
    });

    // 3. The Search Execution Engine
    function executeSearch() {
      const query = searchInput.value.trim().toLowerCase();
      
      if (!query) {
        renderTools(tools);
        return;
      }

      const filtered = tools.filter(tool => {
        return looseMatch(query, tool.name) || tool.desc.toLowerCase().includes(query);
      });

      renderTools(filtered);
    }

    // 4. Typo-Tolerant String Matching Algorithm
    function looseMatch(query, targetName) {
      query = query.toLowerCase().replace(/\s+/g, '');
      const target = targetName.toLowerCase();
      
      // Check 1: Direct substring match
      if (target.includes(query)) return true;

      // Check 2: Sequential Match
      let qIdx = 0;
      for (let i = 0; i < target.length; i++) {
        if (target[i] === query[qIdx]) qIdx++;
        if (qIdx === query.length) return true;
      }

      // Check 3: Typo tolerance via Levenshtein Distance
      const targetWords = target.split(/\s+/);
      for (let word of targetWords) {
        if (levenshtein(query, word) <= 2) return true;
      }
      
      return false;
    }

    function levenshtein(a, b) {
      if (a.length === 0) return b.length;
      if (b.length === 0) return a.length;
      const matrix = [];
      for (let i = 0; i <= b.length; i++) matrix[i] = [i];
      for (let j = 0; j <= a.length; j++) matrix[j] = j;
      for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
          if (b.charAt(i - 1) === a.charAt(j - 1)) {
            matrix[i][j] = matrix[i - 1][j - 1];
          } else {
            matrix[i][j] = Math.min(
              matrix[i - 1][j - 1] + 1,
              matrix[i][j - 1] + 1,
              matrix[i - 1][j] + 1
            );
          }
        }
      }
      return matrix[b.length][a.length];
    }

    // Execute initial render on page load
    renderTools(tools);
  </script>

</body>
</html>
