<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ================================================
       DESIGN TOKENS — Deep Dark / Neon Accents
    ================================================ */
    :root {
      --bg: #07070a;
      --surface: #12121a;
      --surface-hover: #1c1c28;
      --border: #2a2a34;
      --text-main: #ebebf0;
      --text-muted: #9898a8;
      --f-display: 'Syne', sans-serif;
      --f-mono: 'DM Mono', monospace;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 70%);
      color: var(--text-main);
      font-family: var(--f-mono);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header / Welcome ── */
    header {
      text-align: center;
      padding: 80px 24px 40px;
    }
    
    h1 {
      font-family: var(--f-display);
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
    }
    
    header p {
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto;
      font-size: 1rem;
    }

    /* ── Main Grid Layout ── */
    main {
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* This is the better way: auto-fit handles responsiveness automatically */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }

    /* ── Tool Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: all 0.2s ease-out;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent, #555);
      opacity: 0.4;
      transition: opacity 0.2s;
    }

    .card:hover {
      background: var(--surface-hover);
      transform: translateY(-4px);
      border-color: var(--accent, var(--border));
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }
    
    .card:hover::before { opacity: 1; }
    .card.disabled { opacity: 0.5; pointer-events: none; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-icon {
      font-size: 1.8rem;
      background: rgba(255,255,255,0.05);
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
    }

    .card-status {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .card h2 {
      font-family: var(--f-display);
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card p {
      color: var(--text-muted);
      font-size: 0.9rem;
      flex: 1;
    }

    /* ── Footer / About ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      background: rgba(7,7,10,0.8);
    }

    .footer-content {
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <header>
    <h1>The Workspace</h1>
    <p>A collection of privacy-first, client-side utilities and applications. Zero telemetry, no data collection.</p>
  </header>

  <main>
    <div class="tools-grid" id="toolsGrid">
      </div>
  </main>

  <footer>
    <div class="footer-content">
      <p>100% Local Execution. All data processing happens on your device.</p>
      <p style="margin-top: 8px; opacity: 0.5;">System operational.</p>
    </div>
  </footer>

  <script>
    // ==========================================
    // TOOL DIRECTORY DATA
    // To add a new tool, simply add a new object to this array.
    // ==========================================
    const tools = [
      {
        id: 'nullpress',
        name: 'NULLPRESS',
        desc: 'Iterative file compressor. Handles images and PDFs. Nuke-on-save architecture.',
        url: '/nullpress', // Change to your actual path
        icon: '⚡',
        accent: '#22d3ee', // Cyan from the tool
        status: 'Active'
      },
      {
        id: 'cutout',
        name: 'CutOut',
        desc: 'Browser-based background removal using Fuzzy Flood Fill and K-Means clustering.',
        url: '/cutout', // Change to your actual path
        icon: '🖼',
        accent: '#c8ff00', // Lime from the tool
        status: 'Active'
      },
      {
        id: 'focusos',
        name: 'FocusOS',
        desc: 'Study planner and scheduling interface with cognitive load limiting capabilities.',
        url: '#', 
        icon: '⏱',
        accent: '#fbbf24', 
        status: 'In Dev'
      },
      {
        id: 'ghostprotocol',
        name: 'Ghost Protocol',
        desc: 'Secure messaging application with nuke-on-download storage strategy.',
        url: '#',
        icon: '👁‍🗨',
        accent: '#f87171',
        status: 'Planning'
      }
    ];

    // ==========================================
    // RENDER LOGIC
    // ==========================================
    const grid = document.getElementById('toolsGrid');

    function renderTools() {
      grid.innerHTML = tools.map(tool => {
        const isDisabled = tool.url === '#' ? 'disabled' : '';
        const statusStyle = tool.status === 'Active' ? `color: ${tool.accent}; border-color: ${tool.accent}40; background: ${tool.accent}10;` : '';
        
        return `
          <a href="${tool.url}" class="card ${isDisabled}" style="--accent: ${tool.accent}">
            <div class="card-header">
              <div class="card-icon" style="color: ${tool.accent}">${tool.icon}</div>
              <div class="card-status" style="${statusStyle}">${tool.status}</div>
            </div>
            <h2>${tool.name}</h2>
            <p>${tool.desc}</p>
          </a>
        `;
      }).join('');
    }

    // Execute render on load
    renderTools();
  </script>

</body>
</html>
